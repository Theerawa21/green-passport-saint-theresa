<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Green Passport - St. Theresa Zero Waste</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-900: #0b4f3a;
      --green-800: #0f766e;
      --green-700: #1f9d62;
      --green-100: #e4f8ed;
      --blue-700: #2563eb;
      --blue-100: #e8f2ff;
      --yellow-400: #f6c343;
      --yellow-100: #fff4cc;
      --red-100: #ffe5e5;
      --red-700: #c2413f;
      --ink: #17312a;
      --muted: #60766f;
      --line: #d8e8e0;
      --surface: #ffffff;
      --page: #f5fbf8;
      --shadow: 0 14px 38px rgba(15, 118, 110, 0.12);
      --radius: 8px;
      --font-display: "Mitr", "Sarabun", "Noto Sans Thai", "Leelawadee UI", "Segoe UI", Tahoma, sans-serif;
      --font-body: "Sarabun", "Noto Sans Thai", "Leelawadee UI", "Segoe UI", Tahoma, sans-serif;
      --font-ui: "Sarabun", "Noto Sans Thai", "Leelawadee UI", "Segoe UI", Tahoma, sans-serif;
      font-family: var(--font-body);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--page);
      color: var(--ink);
      min-height: 100vh;
      font-family: var(--font-body);
      font-size: 16px;
      line-height: 1.55;
    }
    button, input, select, textarea {
      font-family: var(--font-ui);
      font-size: 16px;
      line-height: 1.45;
    }
    button {
      border: 0;
      cursor: pointer;
    }
    .app {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      min-height: 100vh;
    }
    aside {
      background: linear-gradient(180deg, #0f766e 0%, #128257 58%, #1e5f8f 100%);
      color: #fff;
      padding: 22px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }
    .brand {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 10px;
      align-items: center;
      margin-bottom: 22px;
    }
    .brand-logos {
      position: relative;
      width: 92px;
      min-height: 58px;
    }
    .logo-slot {
      width: 54px;
      height: 54px;
      border: 1px solid rgba(255,255,255,0.72);
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.94);
      padding: 4px;
      overflow: hidden;
      box-shadow: 0 8px 18px rgba(0,0,0,.12);
    }
    .logo-slot.school-logo {
      position: absolute;
      left: 42px;
      top: 6px;
      width: 48px;
      height: 48px;
      border-radius: 999px;
      border-color: rgba(255,255,255,0.86);
      padding: 3px;
    }
    .logo-slot img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .brand h1 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 600;
      line-height: 1.18;
    }
    .brand p {
      margin: 4px 0 0;
      color: rgba(255,255,255,0.8);
      font-size: 13px;
      line-height: 1.35;
    }
    nav {
      display: grid;
      gap: 8px;
    }
    .nav-btn {
      display: grid;
      grid-template-columns: 26px 1fr;
      align-items: center;
      gap: 10px;
      color: rgba(255,255,255,0.88);
      background: transparent;
      padding: 12px;
      border-radius: var(--radius);
      text-align: left;
      font-weight: 500;
    }
    .nav-btn svg { width: 22px; height: 22px; }
    .nav-btn.active,
    .nav-btn:hover {
      background: rgba(255,255,255,0.17);
      color: #fff;
    }
    main {
      padding: 24px;
      max-width: 1360px;
      width: 100%;
      margin: 0 auto;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 18px;
    }
    .topbar-actions {
      display: flex;
      align-items: stretch;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }
    .page-title h2 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 31px;
      font-weight: 600;
      line-height: 1.22;
      color: var(--green-900);
    }
    .page-title p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.55;
    }
    .carbon-pill {
      min-width: 230px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-left: 7px solid var(--yellow-400);
      border-radius: var(--radius);
      padding: 12px 14px;
      box-shadow: var(--shadow);
    }
    .carbon-pill strong {
      color: var(--green-800);
      font-size: 24px;
      font-weight: 800;
    }
    .auth-user-chip {
      min-width: 230px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 8px 28px rgba(15, 122, 79, 0.08);
    }
    .auth-user-chip .avatar {
      width: 40px;
      height: 40px;
      font-size: 14px;
    }
    .auth-user-chip strong,
    .auth-user-chip span {
      display: block;
      max-width: 150px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .auth-user-chip strong {
      color: var(--green-900);
      line-height: 1.2;
    }
    .auth-user-chip span {
      color: var(--muted);
      font-size: 12px;
    }
    .auth-user-chip button {
      margin-left: auto;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--green-800);
      font-size: 12px;
      font-weight: 800;
      padding: 6px 10px;
    }
    body.auth-locked {
      background: #f3fbf7;
    }
    body.auth-locked .app,
    body.auth-locked .mobile-nav {
      display: none;
    }
    body:not(.auth-locked) .auth-screen {
      display: none;
    }
    .auth-screen {
      min-height: 100vh;
      padding: 24px;
      display: grid;
      place-items: center;
      background:
        linear-gradient(115deg, rgba(15,118,110,.12) 0%, rgba(15,118,110,0) 38%),
        linear-gradient(245deg, rgba(37,99,235,.12) 0%, rgba(37,99,235,0) 42%),
        #f3fbf7;
    }
    .auth-shell {
      width: min(1120px, 100%);
      min-height: 680px;
      display: grid;
      grid-template-columns: minmax(0, .88fr) minmax(420px, 1.12fr);
      background: #fff;
      border: 1px solid rgba(15, 122, 79, .14);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(15, 47, 36, .14);
    }
    .auth-brand-panel {
      padding: 36px;
      color: #fff;
      background:
        linear-gradient(155deg, rgba(11,79,58,.98), rgba(15,118,110,.95) 58%, rgba(37,99,235,.9));
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 28px;
    }
    .auth-logo-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .auth-logo {
      width: 76px;
      height: 76px;
      border-radius: var(--radius);
      background: rgba(255,255,255,.96);
      border: 1px solid rgba(255,255,255,.74);
      display: grid;
      place-items: center;
      overflow: hidden;
      box-shadow: 0 14px 30px rgba(0,0,0,.16);
      color: var(--green-900);
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
    }
    .auth-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      padding: 5px;
    }
    .auth-brand-panel h1 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 40px;
      font-weight: 600;
      line-height: 1.12;
      color: #fff;
    }
    .auth-brand-panel p {
      margin: 6px 0 0;
      color: rgba(255,255,255,.82);
      font-size: 17px;
    }
    .auth-brand-list {
      display: grid;
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .auth-brand-list li {
      padding: 12px 14px;
      border: 1px solid rgba(255,255,255,.22);
      border-radius: var(--radius);
      background: rgba(255,255,255,.1);
      color: rgba(255,255,255,.9);
      font-weight: 700;
    }
    .auth-form-panel {
      padding: 34px;
      display: grid;
      align-content: center;
      gap: 18px;
    }
    .auth-tabs {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      padding: 5px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #f7faf8;
    }
    .auth-tab {
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      padding: 10px 12px;
      font-weight: 900;
    }
    .auth-tab.active {
      background: #fff;
      color: var(--green-900);
      box-shadow: 0 8px 18px rgba(15, 122, 79, .09);
    }
    .auth-form {
      display: grid;
      gap: 12px;
    }
    .auth-form h2 {
      margin: 0;
      font-family: var(--font-display);
      color: var(--green-900);
      font-size: 28px;
      line-height: 1.22;
    }
    .auth-form p {
      margin: 0;
      color: var(--muted);
    }
    .auth-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .auth-full {
      grid-column: 1 / -1;
    }
    .auth-help {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
      flex-wrap: wrap;
    }
    .auth-help button {
      background: transparent;
      color: var(--green-800);
      font-weight: 900;
      padding: 0;
    }
    .auth-status {
      border-radius: var(--radius);
      border: 1px solid #c8ead8;
      background: #ecfdf5;
      color: var(--green-900);
      padding: 10px 12px;
      font-weight: 700;
    }
    .auth-status.bad {
      border-color: #fecaca;
      background: #fef2f2;
      color: var(--red-700);
    }
    .section { display: none; }
    .section.active { display: block; }
    .grid {
      display: grid;
      gap: 16px;
    }
    .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid.record-layout { grid-template-columns: minmax(0, 1.35fr) minmax(300px, 0.65fr); align-items: start; }
    .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid.four { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .panel,
    .card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 8px 28px rgba(15, 122, 79, 0.08);
    }
    .panel { padding: 18px; }
    .card { padding: 16px; }
    .hero {
      background: linear-gradient(135deg, #ffffff 0%, #ecfbf2 50%, #eaf3ff 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 24px;
      min-height: 280px;
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 20px;
      align-items: center;
      overflow: hidden;
    }
    .hero h2 {
      color: var(--green-900);
      font-family: var(--font-display);
      font-size: 42px;
      font-weight: 600;
      margin: 0 0 10px;
      line-height: 1.16;
    }
    .hero p {
      color: var(--muted);
      font-size: 18px;
      line-height: 1.6;
      margin: 0 0 18px;
      max-width: 680px;
    }
    .hero-visual {
      min-height: 220px;
      background:
        radial-gradient(circle at 24% 22%, rgba(246, 195, 67, 0.45) 0 12%, transparent 13%),
        radial-gradient(circle at 82% 24%, rgba(37, 99, 235, 0.17) 0 12%, transparent 13%),
        linear-gradient(160deg, #fbfffd 0%, #e4f8ed 100%);
      border: 1px solid #c8ead8;
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      position: relative;
    }
    .hero-visual::before,
    .hero-visual::after {
      content: "";
      position: absolute;
      border-radius: 8px;
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }
    .hero-visual::before {
      width: 62%;
      height: 34%;
      top: 24px;
      left: 24px;
    }
    .hero-visual::after {
      width: 48%;
      height: 40%;
      bottom: 24px;
      right: 24px;
    }
    .hero-visual span {
      z-index: 1;
      width: min(74%, 240px);
      aspect-ratio: 1;
      border-radius: 18px;
      background: rgba(255,255,255,.92);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .hero-visual span img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .school-emblem-badge {
      position: absolute;
      z-index: 2;
      top: 14px;
      right: 14px;
      width: 66px;
      aspect-ratio: 1;
      border-radius: 999px;
      background: rgba(255,255,255,.95);
      border: 2px solid rgba(194, 65, 63, .22);
      box-shadow: 0 10px 24px rgba(23,49,42,.14);
      padding: 5px;
      display: grid;
      place-items: center;
    }
    .school-emblem-badge img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .quick-menu {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }
    .menu-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      color: var(--green-900);
      display: grid;
      gap: 8px;
      min-height: 124px;
      text-align: left;
    }
    .menu-card svg { width: 30px; height: 30px; color: var(--green-700); }
    .menu-card strong { font-family: var(--font-display); font-size: 18px; font-weight: 500; }
    .menu-card small { color: var(--muted); font-size: 14px; line-height: 1.45; }
    .menu-card:hover { border-color: var(--green-700); box-shadow: var(--shadow); }
    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--green-100), #dbeafe);
      color: var(--green-900);
      font-weight: 800;
      border: 2px solid #fff;
      box-shadow: 0 8px 18px rgba(15, 122, 79, .12);
    }
    .post-card {
      display: grid;
      gap: 12px;
    }
    .post-image {
      min-height: 140px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, #ecfdf5, #eff6ff);
      display: grid;
      place-items: center;
      color: var(--muted);
      overflow: hidden;
      border: 1px solid var(--line);
    }
    .post-image img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .tag-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag {
      padding: 5px 9px;
      border-radius: 999px;
      background: #ecfdf5;
      color: var(--green-800);
      border: 1px solid rgba(31,157,98,.22);
      font-size: 12px;
      font-weight: 700;
    }
    .progress-track {
      height: 12px;
      border-radius: 999px;
      background: #e5e7eb;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--green-700), var(--blue-700));
    }
    .chat-layout {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 0;
      min-height: 680px;
      border: 1px solid rgba(15, 122, 79, .16);
      border-radius: 18px;
      overflow: hidden;
      background: #f7faf8;
      box-shadow: 0 18px 45px rgba(15, 47, 36, .08);
    }
    .chat-sidebar {
      background: #fff;
      border-right: 1px solid var(--line);
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      min-height: 680px;
    }
    .chat-sidebar-head {
      padding: 16px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(135deg, #f0fdf4, #eff6ff);
    }
    .chat-sidebar-head h3 { color: var(--green-900); }
    .chat-sidebar-head p { color: var(--muted); }
    .chat-room-list {
      overflow: auto;
      padding: 8px;
    }
    .chat-room-row {
      width: 100%;
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
      padding: 11px 10px;
      border: 0;
      border-radius: 12px;
      background: transparent;
      color: var(--ink);
      text-align: left;
      cursor: pointer;
    }
    .chat-room-row:hover,
    .chat-room-row.active { background: #ecfdf5; }
    .room-avatar,
    .chat-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-weight: 900;
      color: #fff;
      background: linear-gradient(135deg, #16a34a, #2563eb);
      box-shadow: 0 8px 18px rgba(22, 163, 74, .18);
      flex: 0 0 auto;
    }
    .room-avatar.teacher,
    .chat-avatar.teacher { background: linear-gradient(135deg, #f59e0b, #ef4444); }
    .room-avatar.mission,
    .chat-avatar.mission { background: linear-gradient(135deg, #14b8a6, #0f766e); }
    .room-title,
    .chat-line-title {
      display: block;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .room-preview,
    .room-meta,
    .chat-line-sub {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .room-time { color: var(--muted); font-size: 11px; }
    .room-unread {
      display: inline-grid;
      place-items: center;
      min-width: 20px;
      height: 20px;
      border-radius: 999px;
      background: #22c55e;
      color: #fff;
      font-size: 11px;
      font-weight: 900;
      margin-top: 6px;
    }
    .chat-shell {
      min-width: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      background: #eef7f0;
      min-height: 680px;
    }
    .chat-header {
      min-height: 76px;
      padding: 12px 16px;
      background: rgba(255,255,255,.96);
      border-bottom: 1px solid rgba(15, 122, 79, .12);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      backdrop-filter: blur(12px);
    }
    .chat-header-main {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .chat-icon-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid rgba(15, 122, 79, .12);
      background: #fff;
      color: var(--green-800);
      display: inline-grid;
      place-items: center;
      cursor: pointer;
      font-weight: 900;
    }
    .chat-icon-btn:hover { background: #ecfdf5; }
    .chat-toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .chat-window {
      padding: 18px 16px 10px;
      overflow: auto;
      background:
        radial-gradient(circle at 20% 12%, rgba(34, 197, 94, .08), transparent 26%),
        radial-gradient(circle at 85% 0%, rgba(37, 99, 235, .07), transparent 24%),
        #eef7f0;
    }
    .chat-date-divider {
      display: flex;
      justify-content: center;
      margin: 10px 0 18px;
    }
    .chat-date-divider span,
    .chat-system {
      color: #386150;
      background: rgba(255,255,255,.78);
      border: 1px solid rgba(15, 122, 79, .08);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 800;
      box-shadow: 0 8px 22px rgba(15, 47, 36, .06);
    }
    .chat-system {
      width: fit-content;
      max-width: min(92%, 520px);
      margin: 12px auto;
      border-radius: 14px;
      text-align: center;
      line-height: 1.45;
    }
    .chat-message {
      display: flex;
      gap: 8px;
      margin: 3px 0 10px;
      align-items: flex-end;
    }
    .chat-message.own {
      justify-content: flex-end;
    }
    .chat-message.own .chat-avatar { display: none; }
    .chat-message.compact {
      margin-top: -5px;
    }
    .chat-message.compact .chat-avatar,
    .chat-message.compact .chat-sender { visibility: hidden; height: 0; margin: 0; }
    .chat-stack {
      max-width: min(72%, 620px);
      display: grid;
      gap: 3px;
    }
    .chat-message.own .chat-stack { justify-items: end; }
    .chat-sender {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #36584c;
      font-size: 12px;
      font-weight: 800;
      padding: 0 6px;
    }

      line-height: 1;
    }
    .level-chip.active {
      border-color: var(--green-700);
      background: var(--green-100);
      box-shadow: var(--shadow);
    }
    .mission-map {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      position: relative;
    }
    .game-map-head { align-items: start; }
    .mission-map::before {
      content: "";
      position: absolute;
      inset: 18px 8%;
      border: 2px dashed rgba(31, 157, 98, .18);
      border-radius: 32px;
      pointer-events: none;
    }
    .mission-card {
      text-align: left;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      color: var(--ink);
      min-height: 150px;
      display: grid;
      gap: 8px;
      align-content: start;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
      position: relative;
      z-index: 1;
    }
    .mission-card:not(:disabled):hover {
      border-color: var(--green-700);
      box-shadow: var(--shadow);
      transform: translateY(-1px);
    }
    .mission-card:disabled {
      opacity: .62;
      cursor: not-allowed;
      background: #f5f7f6;
    }
    .mission-icon {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--green-100);
      color: var(--green-800);
      font-size: 24px;
    }
    .mission-stars { color: #d89b00; font-weight: 800; letter-spacing: 1px; }
    .mission-card.recycle .mission-icon { background: var(--yellow-100); color: #94650b; }
    .mission-card.general .mission-icon { background: var(--blue-100); color: var(--blue-700); }
    .mission-card.hazard .mission-icon { background: #ffedd5; color: #c65f16; }
    .mission-card.infectious .mission-icon { background: var(--red-100); color: var(--red-700); }
    .mission-card.completed {
      border-color: #a8dfbf;
      background: #fbfffd;
    }
    .mission-card.completed .mission-icon { animation: starPop .7s ease both; }
    .mission-card.active-stage {
      border-color: var(--yellow-400);
      box-shadow: 0 10px 26px rgba(246, 195, 67, .18);
    }
    .score-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    .score-meter {
      height: 12px;
      background: #e8f2ed;
      border-radius: 999px;
      overflow: hidden;
    }
    .score-meter span {
      display: block;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--yellow-400), var(--green-700));
      border-radius: inherit;
      transition: width .45s ease;
    }
    .feedback-box {
      margin-top: 12px;
      padding: 12px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: #fff;
      animation: feedbackIn .25s ease both;
    }
    .feedback-box.correct { background: var(--green-100); border-color: #bdebd6; color: var(--green-900); }
    .feedback-box.wrong { background: var(--yellow-100); border-color: #f3d36a; color: #675018; animation: feedbackIn .25s ease both, softShake .28s ease .02s; }
    .stage-result-card {
      background:
        radial-gradient(circle at 12% 18%, rgba(246, 195, 67, .2) 0 10%, transparent 11%),
        linear-gradient(135deg, #ffffff 0%, #ecfbf2 100%);
    }
    .game-cert {
      background:
        radial-gradient(circle at 12% 16%, rgba(31, 157, 98, .14) 0 9%, transparent 10%),
        radial-gradient(circle at 86% 18%, rgba(246, 195, 67, .25) 0 11%, transparent 12%),
        linear-gradient(#ffffff, #ffffff) padding-box,
        linear-gradient(135deg, var(--green-700), var(--yellow-400), #f97316, var(--blue-700)) border-box;
      border: 8px solid transparent;
      border-radius: var(--radius);
      min-height: 360px;
      padding: 28px;
      text-align: center;
      display: grid;
      gap: 10px;
      align-content: center;
    }
    .choices {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }
    .choice {
      background: #fff;
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      text-align: left;
      transition: transform .16s ease, border-color .16s ease, background .16s ease;
    }
    .choice:hover { border-color: var(--green-700); }
    .choice.correct-choice {
      border-color: var(--green-700);
      background: var(--green-100);
      animation: starPop .36s ease both;
    }
    .choice.wrong-choice {
      border-color: var(--red-700);
      background: var(--red-100);
      animation: softShake .28s ease both;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--green-800);
      padding: 5px 9px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 13px;

    .badge.earned,

      border-color: #f3d36a;
      color: #73560d;
      box-shadow: 0 8px 18px rgba(246, 195, 67, .16);

    .badge.earned { animation: badgeShine 1.2s ease both; }
    .badge-medal {

      border-radius: 999px;

    @keyframes buddyBob {

      0% { transform: scale(.92); }
      55% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
    @keyframes feedbackIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes softShake {
      0%, 100% { transform: translateX(0); }
      30% { transform: translateX(-4px); }
      65% { transform: translateX(4px); }
    }
    @keyframes badgeShine {
      0% { transform: rotate(-4deg) scale(.96); filter: brightness(1); }
      50% { transform: rotate(4deg) scale(1.04); filter: brightness(1.12); }
      100% { transform: rotate(0) scale(1); filter: brightness(1); }

    function playGameSound(kind = 'button') {
      if (!state.game.soundOn) return;
      try {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return;
        const ctx = new AudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const tones = { button: 420, correct: 720, wrong: 180, badge: 880, stage: 640, finish: 520 };
        osc.frequency.value = tones[kind] || 420;
        osc.type = kind === 'wrong' ? 'sawtooth' : 'sine';
        gain.gain.setValueAtTime(0.001, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.055, ctx.currentTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.16);
        osc.connect(gain).connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.17);
      } catch (e) {}
    }

    function summarizeHouseholds(records) {
      const groups = {};
      records.forEach((r) => (groups[r.HouseholdName] ||= []).push(r));
      return Object.entries(groups).map(([house, rows]) => {
        const sorted = rows.sort((a, b) => a.ReportMonth.localeCompare(b.ReportMonth));
        const first = sorted[0];
        const last = sorted[sorted.length - 1];
        const totalCO2e = sum(rows, 'TotalCO2e');
        const totalWaste = rows.reduce((t, r) => t + sumOne(r, ['GeneralWasteKg','RecycleWasteKg','OrganicWasteKg','HazardousWasteAmount']), 0);
        const managed = rows.reduce((t, r) => t + sumOne(r, ['PaperKg','PlasticBottleKg','CanKg','AluminumKg','SteelCanKg','ScrapIronKg','GlassBottleKg','CompostFoodKg','BioExtractKg','FeedAnimalsKg']), 0);
        return {
          HouseholdName: house,
          StudentName: last.StudentName,
          ClassName: last.ClassName,
          TotalSubmissions: rows.length,
          TotalWasteKg: round(totalWaste),
          TotalManagedWasteKg: round(managed),
          TotalCO2e: round(totalCO2e),
          GeneralWasteReductionPercent: first.GeneralWasteKg ? round(((first.GeneralWasteKg - last.GeneralWasteKg) / first.GeneralWasteKg) * 100) : 0,
          OrganicWasteManagedPercent: last.OrganicWasteKg ? round(((last.CompostFoodKg + last.BioExtractKg + last.FeedAnimalsKg) / last.OrganicWasteKg) * 100) : 0,
          BestImprovementScore: round(totalCO2e / 2),
          ZeroWasteHomeStatus: totalCO2e >= 50 ? 'ผ่านเกณฑ์ Zero Waste Home' : 'กำลังพัฒนา',
          CertificateStatus: totalCO2e >= 30 ? 'พร้อมออกเกียรติบัตร' : 'รอสะสมผลลัพธ์',
        };
      });
    }

    function levelInfoByEXP(exp) {
      const value = Number(exp || 0);
      return [...levelCatalog].reverse().find((level) => value >= level.min) || levelCatalog[0];
    }

    function nextLevelInfo(exp) {
      const value = Number(exp || 0);
      return levelCatalog.find((level) => value < level.min) || levelCatalog[levelCatalog.length - 1];
    }

    function progressToNextLevel(exp) {
      const current = levelInfoByEXP(exp);
      const next = nextLevelInfo(exp);
      if (current.name === next.name) return 100;
      const span = Math.max(1, next.min - current.min);
      return Math.min(100, Math.max(0, ((Number(exp || 0) - current.min) / span) * 100));
    }

    function safeDisplayName(name = '') {
      const clean = String(name || 'ผู้ใช้ Green').trim();
      if (clean.length <= 8) return clean;
      return `${clean.slice(0, 1)}.${clean.split(' ').slice(-1)[0] || 'Green'}`;
    }

    function avatarText(name = '') {
      return String(name || 'G').trim().slice(0, 2).toUpperCase();
    }

    function splitTags(value = '') {
      return String(value || '').split(',').map((x) => x.trim()).filter(Boolean);
    }

    function buildProfilesFromData(households = [], scores = [], posts = [], comments = [], expLogs = []) {
      const profiles = {};
      function ensureProfile(key, base = {}) {
        const id = key || base.StudentID || base.UserID || base.DisplayName || base.StudentName || base.FullName || 'guest';
        profiles[id] ||= {
          UserID: id,
          DisplayName: safeDisplayName(base.DisplayName || base.StudentName || base.FullName || id),
          FirstName: '',
          LastName: '',
          ClassName: base.ClassName || '',
          StudentIDMasked: String(base.StudentID || id || '').replace(/(.{2}).+(.{2})/, '$1***$2'),
          Avatar: avatarText(base.DisplayName || base.StudentName || base.FullName || id),
          CurrentEXP: 0,
          TotalScore: 0,
          TotalStars: 0,
          TotalBadges: 0,
          TotalPosts: 0,
          TotalComments: 0,
          TotalSubmissions: 0,
          TotalCO2e: 0,
          HouseholdStatus: '',
          LastActiveAt: '',
          ConsentStatus: 'ยินยอม',
        };
        Object.assign(profiles[id], Object.fromEntries(Object.entries(base).filter(([, value]) => value !== '' && value !== undefined)));
        return profiles[id];
      }
      households.forEach((h) => {
        const profile = ensureProfile(h.StudentName || h.HouseholdName, h);
        profile.TotalSubmissions = Math.max(Number(profile.TotalSubmissions || 0), Number(h.TotalSubmissions || 0));
        profile.TotalCO2e = Math.max(Number(profile.TotalCO2e || 0), Number(h.TotalCO2e || 0));
        profile.HouseholdStatus = h.ZeroWasteHomeStatus || profile.HouseholdStatus;
        profile.CurrentEXP += Number(h.TotalSubmissions || 0) * 20 + Math.round(Number(h.TotalCO2e || 0));
      });
      scores.forEach((s) => {
        const profile = ensureProfile(s.StudentID || s.FullName, s);
        const badgeCount = String(s.Badges || '').split(',').filter(Boolean).length;
        profile.TotalScore = Math.max(Number(profile.TotalScore || 0), Number(s.TotalScore || 0));
        profile.TotalStars = Math.max(Number(profile.TotalStars || 0), Number(s.TotalStars || 0));
        profile.TotalBadges = Math.max(Number(profile.TotalBadges || 0), badgeCount);
        profile.CurrentEXP += Math.round(Number(s.TotalScore || 0) / 3) + badgeCount * 50;
      });
      posts.filter((p) => p.ReviewStatus === 'เผยแพร่แล้ว').forEach((p) => {
        const profile = ensureProfile(p.UserID || p.DisplayName, p);
        profile.TotalPosts += 1;
        profile.CurrentEXP += 40 + Number(p.Likes || 0) * 2;
      });
      comments.filter((c) => c.ReviewStatus === 'เผยแพร่แล้ว').forEach((c) => {
        const profile = ensureProfile(c.UserID || c.DisplayName, c);
        profile.TotalComments += 1;
        profile.CurrentEXP += 5 + Number(c.LikeCount || 0);
      });
      expLogs.forEach((log) => {
        const profile = ensureProfile(log.UserID || 'guest', log);
        profile.CurrentEXP += Number(log.EXPAmount || 0);
      });
      return Object.values(profiles).map((profile) => {
        const level = levelInfoByEXP(profile.CurrentEXP);
        return { ...profile, CurrentLevel: `${level.emoji} ${level.name}`, LevelName: level.name, LevelEmoji: level.emoji, LevelColor: level.color };
      }).sort((a, b) => Number(b.CurrentEXP || 0) - Number(a.CurrentEXP || 0));
    }

    function allProfiles() {
      const generated = buildProfilesFromData(state.data.householdSummary || [], state.data.gameScores || [], state.data.communityPosts || [], state.data.postComments || [], state.data.expLogs || []);
      const stored = (state.data.userProfiles || []).filter((p) => p.UserID || p.DisplayName);
      const merged = {};
      [...generated, ...stored].forEach((profile) => {
        const id = profile.UserID || profile.DisplayName;
        merged[id] = { ...(merged[id] || {}), ...profile };
      });
      return Object.values(merged).map((profile) => {
        const exp = Number(profile.CurrentEXP || 0);
        const level = levelInfoByEXP(exp);
        return { ...profile, CurrentEXP: exp, CurrentLevel: profile.CurrentLevel || `${level.emoji} ${level.name}`, LevelName: profile.LevelName || level.name, LevelEmoji: profile.LevelEmoji || level.emoji, LevelColor: profile.LevelColor || level.color };
      }).sort((a, b) => Number(b.CurrentEXP || 0) - Number(a.CurrentEXP || 0));
    }

    function buildDashboard(records, households) {
      const monthMap = {};
      records.forEach((r) => {
        const m = r.ReportMonth || 'ไม่ระบุ';
        monthMap[m] ||= { month: m, general: 0, recycle: 0, organic: 0, organicManaged: 0, hazardous: 0, co2e: 0 };
        monthMap[m].general += Number(r.GeneralWasteKg || 0);
        monthMap[m].recycle += Number(r.RecycleWasteKg || 0);
        monthMap[m].organic += Number(r.OrganicWasteKg || 0);
        monthMap[m].organicManaged += sumOne(r, ['CompostFoodKg','BioExtractKg','FeedAnimalsKg']);
        monthMap[m].hazardous += Number(r.HazardousWasteAmount || 0);
        monthMap[m].co2e += Number(r.TotalCO2e || 0);
      });
      return {
        householdCount: households.length,
        recordCount: records.length,
        totalWasteKg: round(records.reduce((t, r) => t + sumOne(r, ['GeneralWasteKg','RecycleWasteKg','OrganicWasteKg','HazardousWasteAmount']), 0)),
        managedWasteKg: round(records.reduce((t, r) => t + sumOne(r, ['PaperKg','PlasticBottleKg','CanKg','AluminumKg','SteelCanKg','ScrapIronKg','GlassBottleKg','CompostFoodKg','BioExtractKg','FeedAnimalsKg']), 0)),
        totalCO2e: round(sum(records, 'TotalCO2e')),
        monthSeries: Object.values(monthMap).sort((a, b) => a.month.localeCompare(b.month)),
        completedHouseholds: households.filter((h) => Number(h.TotalSubmissions) >= 3).length,
        pendingHouseholds: households.filter((h) => Number(h.TotalSubmissions) < 3).length,
        topHouseholds: [...households].sort((a, b) => b.TotalCO2e - a.TotalCO2e).slice(0, 10),
      };
    }

    async function fetchSheetData(sheetName) {
      const params = new URLSearchParams({ sheet: sheetName, tq: 'select *', headers: '1' });
      const response = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?${params}`);
      if (!response.ok) throw new Error(`อ่านชีต ${sheetName} ไม่สำเร็จ`);
      return parseGvizResponse(await response.text()).map((row, index) => normalizeRow(Object.assign({ _rowNumber: index + 2 }, row)));
    }

    function parseGvizResponse(text) {
      const match = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]+)\);?$/);
      if (!match) return [];
      const payload = Function(`"use strict";return (${match[1]});`)();
      const table = payload.table || {};
      const headers = (table.cols || []).map((col, index) => String(col.label || col.id || `Column${index + 1}`).trim());
      return (table.rows || []).map((row) => {
        const item = {};
        (row.c || []).forEach((cell, index) => {
          const key = headers[index];
          if (!key) return;
          const value = cell?.v instanceof Date ? cell.v.toISOString().slice(0, 10) : cell?.v;
          item[key] = value ?? '';
        });
        return item;
      }).filter((row) => Object.values(row).some((value) => String(value || '').trim()));
    }

    async function loadBootstrapFromPublicSheets() {
      const [wasteRecords, gameScores, carbonFactors, settingsRows] = await Promise.all([
        fetchSheetData('WasteRecords').catch(() => []),
        fetchSheetData('GameScores').catch(() => []),
        fetchSheetData('CarbonFactors').catch(() => []),
        fetchSheetData('AdminSettings').catch(() => []),
      ]);
      const settings = Object.fromEntries(settingsRows.map((row) => [row.SettingKey || row.Key, row.SettingValue || row.Value]).filter(([key]) => key));
      return buildBootstrapData({ wasteRecords, gameScores, carbonFactors, settings });
    }

    function buildBootstrapData(data) {
      const wasteRecords = (data.wasteRecords || []).map(normalizeRow);
      const gameScores = (data.gameScores || []).map(normalizeRow);
      const householdSummary = data.householdSummary || summarizeHouseholds(wasteRecords);
      return {
        carbonFactors: data.carbonFactors?.length ? data.carbonFactors.map(normalizeRow) : state.data.carbonFactors,
        wasteRecords,
        gameScores,
        householdSummary,
        dashboard: data.dashboard || buildDashboard(wasteRecords, householdSummary),
        communityPosts: data.communityPosts || state.data.communityPosts || [],
        postComments: data.postComments || state.data.postComments || [],
        chatMessages: data.chatMessages || state.data.chatMessages || [],
        chatRooms: data.chatRooms?.length ? data.chatRooms : state.data.chatRooms || defaultChatRooms(),
        userProfiles: data.userProfiles || state.data.userProfiles || [],
        levelRules: data.levelRules?.length ? data.levelRules : state.data.levelRules || defaultLevelRules(),
        expLogs: data.expLogs || state.data.expLogs || [],
        settings: data.settings || state.data.settings || {},
      };
    }

    function normalizeRow(row) {
      const numericFields = [
        'GeneralWasteKg','RecycleWasteKg','OrganicWasteKg','HazardousWasteAmount','PaperKg','PlasticBottleKg','CanKg','AluminumKg','SteelCanKg',
        'ScrapIronKg','GlassBottleKg','CompostFoodKg','BioExtractKg','FeedAnimalsKg','ReducePlasticBagTimes','CarryBottleTimes','UseLunchBoxTimes',
        'RefuseStrawTimes','CarryClothBagTimes','RepairItemsTimes','DonateItemsTimes','DisposeBatteriesAmount','DisposeBulbsAmount',
        'DisposeExpiredMedicineAmount','TotalCO2e','TotalScore','TotalStars','LatestStageScore','LatestStageStars','EF',
        'Likes','CommentCount','LikeCount','CurrentEXP','EXPAmount','TotalBadges','TotalPosts','TotalComments','TotalSubmissions',
      ];
      for (let i = 1; i <= 9; i += 1) numericFields.push(`Stage${i}Score`, `Stage${i}Stars`);
      const result = Object.assign({}, row);
      numericFields.forEach((field) => {
        if (result[field] !== undefined && result[field] !== '') result[field] = Number(result[field] || 0);
      });
      if (!result.ReviewStatus && result.HouseholdName) result.ReviewStatus = 'รอตรวจสอบ';
      return result;
    }

    // Firebase helper functions
    async function firebaseEmailLookup(login) {
      if (!login) throw new Error('กรุณากรอกข้อมูลเพื่อเข้าสู่ระบบ');
      const cleanLogin = String(login).trim().toLowerCase();
      if (cleanLogin.includes('@')) {
        return cleanLogin;
      }
      if (!firebaseFs) {
        throw new Error('ระบบเชื่อมต่อฐานข้อมูลยังไม่พร้อมใช้งาน');
      }
      const usernameDoc = await firebaseFs.collection('usernames').doc(cleanLogin).get();
      if (usernameDoc.exists) {
        return usernameDoc.data().email;
      }
      const studentDoc = await firebaseFs.collection('studentIDs').doc(cleanLogin).get();
      if (studentDoc.exists) {
        return studentDoc.data().email;
      }
      throw new Error('ไม่พบข้อมูลบัญชีผู้ใช้นี้ในระบบ');
    }

    function deriveEmail(usernameOrStudentId, emailInput) {
      const cleanInput = String(emailInput || '').trim().toLowerCase();
      if (cleanInput && cleanInput.includes('@')) {
        return cleanInput;
      }
      const cleanId = String(usernameOrStudentId || '').trim().toLowerCase().replace(/[^a-z0-9]/g, '');
      return `${cleanId}@greenpassport.local`;
    }

    async function fetchUserProfilesFromFirestore() {
      if (!firebaseFs) return;
      try {
        const snapshot = await firebaseFs.collection('userProfiles').get();
        const profiles = [];
        snapshot.forEach((doc) => {
          profiles.push(Object.assign({ UserID: doc.id }, doc.data()));
        });
        state.data.userProfiles = profiles.map(normalizeRow);
        renderAll();
      } catch (e) {
        console.error("Error fetching user profiles from Firestore:", e);
      }
    }

    // Firebase Realtime DB Chat Subscriptions
    let currentChatSubscription = null;
    function subscribeToFirebaseChat(roomId) {
      if (currentChatSubscription) {
        currentChatSubscription.off();
      }
      if (!firebaseDb) return;
      currentChatSubscription = firebaseDb.ref(`chatMessages/${roomId}`).orderByChild('Timestamp');
      currentChatSubscription.on('value', (snapshot) => {
        const val = snapshot.val();
        const list = [];
        if (val) {
          Object.keys(val).forEach(key => {
            list.push(val[key]);
          });
        }
        // sort by Timestamp
        list.sort((a, b) => String(a.Timestamp || '').localeCompare(String(b.Timestamp || '')));
        
        // Update local state.data.chatMessages with these messages
        state.data.chatMessages = state.data.chatMessages.filter(m => m.ChatRoomID !== roomId);
        state.data.chatMessages.push(...list.map(normalizeRow));
        
        // Render chat if current page is chat
        if (state.active === 'chat') {
          renderChat();
        }
      });
    }

    async function sheetApi(action, payload = {}) {
      if (!sheetApiConfigured()) throw new Error('ยังไม่ได้ตั้งค่า Apps Script Web App endpoint สำหรับบันทึกลง Google Sheets');
      return sheetApiViaFrame(action, payload);
    }

    function sheetApiViaFrame(action, payload = {}) {
      return new Promise((resolve, reject) => {
        const token = `gp-${Date.now()}-${Math.random().toString(36).slice(2)}`;
        const frameName = `green-passport-api-${token}`;
        const iframe = document.createElement('iframe');
        const form = document.createElement('form');
        const cleanup = () => {
          window.removeEventListener('message', onMessage);
          clearTimeout(timer);
          iframe.remove();
          form.remove();
        };
        const timer = setTimeout(() => {
          cleanup();
          reject(new Error('รอคำตอบจาก Google Sheets Web App นานเกินไป'));
        }, 30000);
        const onMessage = (event) => {
          const message = event.data || {};
          if (!message.greenPassportApi || message.token !== token) return;
          cleanup();
          const data = message.response || {};
          if (data.ok === false) reject(new Error(data.message || `เรียก API ${action} ไม่สำเร็จ`));
          else resolve(data);
        };
        window.addEventListener('message', onMessage);
        iframe.name = frameName;
        iframe.style.display = 'none';
        form.method = 'POST';
        form.action = sheetApiUrl;
        form.target = frameName;
        form.style.display = 'none';
        form.innerHTML = `
          <input type="hidden" name="frame" value="1">
          <input type="hidden" name="payload">
        `;
        form.elements.payload.value = JSON.stringify(Object.assign({ action, _token: token }, payload));
        document.body.append(iframe, form);
        form.submit();
      });
    }

    function loadFromLocalStorage() {
      try {
        const cached = JSON.parse(localStorage.getItem(LOCAL_DATA_KEY) || '{}');
        if (!cached.wasteRecords && !cached.gameScores && !cached.communityPosts && !cached.chatMessages) return;
        hydrateData(buildBootstrapData({
          wasteRecords: cached.wasteRecords || [],
          gameScores: cached.gameScores || [],
          communityPosts: cached.communityPosts || [],
          postComments: cached.postComments || [],
          chatMessages: cached.chatMessages || [],
          chatRooms: cached.chatRooms || [],
          userProfiles: cached.userProfiles || [],
          levelRules: cached.levelRules || [],
          expLogs: cached.expLogs || [],
          settings: cached.settings || {},
          carbonFactors: state.data.carbonFactors,
        }));
      } catch (e) {}
    }

    function queuePendingWrite(action, payload) {
      const pending = JSON.parse(localStorage.getItem(LOCAL_QUEUE_KEY) || '[]');
      pending.push({ action, payload, queuedAt: new Date().toISOString() });
      localStorage.setItem(LOCAL_QUEUE_KEY, JSON.stringify(pending));
    }

    async function syncPendingWrites() {
      if (!sheetApiConfigured()) return;
      const pending = JSON.parse(localStorage.getItem(LOCAL_QUEUE_KEY) || '[]');
      if (!pending.length) return;
      const remaining = [];
      for (const item of pending) {
        try {
          await sheetApi(item.action, item.payload);
        } catch (e) {
          remaining.push(item);
        }
      }
      localStorage.setItem(LOCAL_QUEUE_KEY, JSON.stringify(remaining));
      if (remaining.length !== pending.length) await reloadData(true);
    }

    function isAuthenticated() {
      return !!(state.currentUser && state.currentUser.UserID);

    function restoreAuthSession() {
      let session = readJsonStorage(AUTH_SESSION_KEY, null);
      if (!session || !session.user) {
        try {
          const raw = sessionStorage.getItem(AUTH_SESSION_KEY);
          session = raw ? JSON.parse(raw) : null;
        } catch (e) {
          session = null;
        }
      }
      if (!session || !session.user) return false;
      state.authToken = session.token || '';
      state.currentUser = normalizeAuthUser(session.user);
      applyCurrentUserToState();
      return true;
    }

    function persistAuthSession(session) {
      localStorage.setItem(AUTH_SESSION_KEY, JSON.stringify({
        token: session.token || '',
        user: normalizeAuthUser(session.user || {}),
        savedAt: new Date().toISOString(),
      }));
    }

    function clearAuthSession() {
      localStorage.removeItem(AUTH_SESSION_KEY);
      sessionStorage.removeItem(AUTH_SESSION_KEY);
      state.authToken = '';
      state.currentUser = null;
      state.chatIdentity = {};
      localStorage.removeItem('greenPassportChatIdentity');
    }

    function showAuthHelp() {
      setAuthMessage('ถ้าลืมรหัสผ่าน ให้ติดต่อครูหรือผู้ดูแลระบบเพื่อรีเซ็ตรหัสผ่านในชีต AppUsers หรือสมัครบัญชีใหม่สำหรับโหมดทดสอบในเครื่อง', '');
    }

    function authLookupKey(value) {
      return String(value || '').trim().toLowerCase();
    }

    function maskStudentId(value) {
      const text = String(value || '').trim();
      if (!text) return '';
      if (text.length <= 4) return text;
      return text.replace(/(.{2}).+(.{2})/, '$1***$2');
    }

    function normalizeAuthUser(user = {}) {
      const firstName = String(user.FirstName || user.firstName || '').trim();
      const lastName = String(user.LastName || user.lastName || '').trim();
      const fullName = `${firstName} ${lastName}`.trim();
      const username = String(user.Username || user.username || '').trim();
      const email = String(user.Email || user.email || '').trim();
      const studentId = String(user.StudentID || user.StudentId || user.studentId || '').trim();
      const displayName = String(user.DisplayName || user.displayName || fullName || username || email || studentId || 'Green User').trim();
      const userId = String(user.UserID || user.userId || studentId || username || email || displayName).trim();
      return {
        UserID: userId,
        Username: username,
        Email: email,
        Role: String(user.Role || user.role || 'student').trim() || 'student',
        DisplayName: displayName,
        FirstName: firstName,
        LastName: lastName,
        ClassName: String(user.ClassName || user.className || '').trim(),
        StudentID: studentId,
        StudentIDMasked: String(user.StudentIDMasked || user.studentIDMasked || maskStudentId(studentId || userId)).trim(),
        HouseholdName: String(user.HouseholdName || user.householdName || '').trim(),
        Avatar: String(user.Avatar || user.avatar || avatarText(displayName)).trim(),
        ConsentStatus: String(user.ConsentStatus || user.consentStatus || '').trim(),
        Status: String(user.Status || user.status || 'active').trim(),
        CreatedAt: user.CreatedAt || user.createdAt || '',
        LastLoginAt: user.LastLoginAt || user.lastLoginAt || '',
      };
    }

    function publicAuthUser(user) {
      const clean = normalizeAuthUser(user || {});
      return clean;
    }

    function currentUserIdentity() {
      const user = normalizeAuthUser(state.currentUser || {});
      return {
        UserID: user.UserID || user.StudentID || user.Username || user.DisplayName,
        DisplayName: user.DisplayName || `${user.FirstName || ''} ${user.LastName || ''}`.trim() || user.Username || 'Green User',
        ClassName: user.ClassName || '',
        StudentID: user.StudentID || user.UserID || '',
        HouseholdName: user.HouseholdName || '',
        Role: user.Role || 'student',
      };
    }

    function userModeFromRole(role) {
      const value = String(role || '').toLowerCase();
      if (['parent','teacher','leader'].includes(value)) return value;
      return 'student';
    }

    function applyCurrentUserToState() {
      if (!state.currentUser) return;
      const user = normalizeAuthUser(state.currentUser);
      state.currentUser = user;
      state.userMode = userModeFromRole(user.Role);
      localStorage.setItem('greenPassportUserMode', state.userMode);
      state.chatIdentity = {
        DisplayName: user.DisplayName,
        ClassName: user.ClassName,
        UserID: user.UserID,
      };
      localStorage.setItem('greenPassportChatIdentity', JSON.stringify(state.chatIdentity));
      state.profileUserID = user.UserID;
      const profile = {
        UserID: user.UserID,
        DisplayName: user.DisplayName,
        FirstName: user.FirstName,
        LastName: user.LastName,
        ClassName: user.ClassName,
        StudentIDMasked: user.StudentIDMasked,
        Avatar: user.Avatar || avatarText(user.DisplayName),
        CurrentLevel: 'Green Starter',
        CurrentEXP: 0,
        TotalScore: 0,
        TotalStars: 0,
        TotalBadges: 0,
        TotalPosts: 0,
        TotalComments: 0,
        TotalSubmissions: 0,
        TotalCO2e: 0,
        HouseholdStatus: user.HouseholdName || '',
        LastActiveAt: nowStamp(),
        ConsentStatus: user.ConsentStatus || 'ยินยอม',
      };
      const profiles = state.data.userProfiles || [];
      const index = profiles.findIndex((item) => String(item.UserID || item.DisplayName) === String(user.UserID));
      if (index >= 0) profiles[index] = Object.assign({}, profile, profiles[index], { LastActiveAt: nowStamp() });
      else profiles.unshift(profile);
      state.data.userProfiles = profiles;
      const nameParts = splitUserName(user);
      state.game.profile.firstName ||= nameParts.firstName;
      state.game.profile.lastName ||= nameParts.lastName;
      state.game.profile.className ||= user.ClassName;
      state.game.profile.studentId ||= user.StudentID || user.UserID;
      state.game.profile.teamName ||= `${user.DisplayName} Green Team`;
    }

    function splitUserName(user) {
      const normalized = normalizeAuthUser(user || {});
      if (normalized.FirstName || normalized.LastName) return { firstName: normalized.FirstName, lastName: normalized.LastName };
      const parts = String(normalized.DisplayName || '').trim().split(/\s+/);
      return { firstName: parts.shift() || normalized.DisplayName || 'Green', lastName: parts.join(' ') || 'User' };
    }

    function authRecordDefaults() {
      const user = currentUserIdentity();
      return {
        StudentName: `${state.currentUser?.FirstName || ''} ${state.currentUser?.LastName || ''}`.trim() || user.DisplayName,
        ClassName: user.ClassName,
        StudentID: user.StudentID,
        HouseholdName: user.HouseholdName || `${user.DisplayName} Home`,
      };
    }

    function localAuthUsers() {
      return readJsonStorage(LOCAL_AUTH_USERS_KEY, []);
    }

    function saveLocalAuthUsers(users) {
      localStorage.setItem(LOCAL_AUTH_USERS_KEY, JSON.stringify(users || []));
    }

    async function hashText(value) {
      const text = String(value || '');
      if (window.crypto?.subtle && window.TextEncoder) {
        const bytes = new TextEncoder().encode(text);
        const digest = await crypto.subtle.digest('SHA-256', bytes);
        return [...new Uint8Array(digest)].map((b) => b.toString(16).padStart(2, '0')).join('');
      }
      let hash = 0;
      for (let i = 0; i < text.length; i += 1) hash = ((hash << 5) - hash) + text.charCodeAt(i);
      return `fallback-${Math.abs(hash)}`;
    }

    function randomToken(prefix = 'local') {
      return `${prefix}-${Date.now()}-${Math.random().toString(36).slice(2)}${Math.random().toString(36).slice(2)}`;
    }

    async function localSignupUser(user, password) {
      const users = localAuthUsers();
      const normalized = normalizeAuthUser(user);
      normalized.UserID = normalized.UserID || normalized.StudentID || normalized.Username || normalized.Email;
      const keys = [normalized.Username, normalized.Email, normalized.UserID, normalized.StudentID].map(authLookupKey).filter(Boolean);
      const duplicate = users.some((item) => [item.Username, item.Email, item.UserID, item.StudentID].some((value) => keys.includes(authLookupKey(value))));
      if (duplicate) throw new Error('บัญชีนี้มีอยู่แล้ว กรุณา Login หรือใช้ Username อื่น');
      const salt = randomToken('salt');
      const stored = Object.assign({}, normalized, {
        PasswordSalt: salt,
        PasswordHash: await hashText(`${salt}:${password}:green-passport`),
        CreatedAt: new Date().toISOString(),
        LastLoginAt: new Date().toISOString(),
        Status: 'active',
      });
      users.push(stored);
      saveLocalAuthUsers(users);
      return { ok: true, token: randomToken('local-session'), user: publicAuthUser(stored), local: true };
    }

    async function localLoginUser(login, password) {
      const key = authLookupKey(login);
      const users = localAuthUsers();
      const user = users.find((item) => [item.Username, item.Email, item.UserID, item.StudentID].some((value) => authLookupKey(value) === key));
      if (!user) throw new Error('ไม่พบบัญชีนี้ในเครื่อง');
      const hash = await hashText(`${user.PasswordSalt}:${password}:green-passport`);
      if (hash !== user.PasswordHash) throw new Error('รหัสผ่านไม่ถูกต้อง');
      user.LastLoginAt = new Date().toISOString();
      saveLocalAuthUsers(users);
      return { ok: true, token: randomToken('local-session'), user: publicAuthUser(user), local: true };
    }

    async function completeAuthSession(result, remember = true) {
      const session = {
        token: result.token || randomToken('session'),
        user: normalizeAuthUser(result.user || {}),
      };
      state.authToken = session.token;
      state.currentUser = session.user;
      state.authMessage = '';
      state.authMessageType = '';
      if (remember) persistAuthSession(session);
      else sessionStorage.setItem(AUTH_SESSION_KEY, JSON.stringify(session));
      applyCurrentUserToState();
      document.body.classList.remove('auth-locked');
      renderNav();
      renderAll();
      try {
        await reloadData(true);
        applyCurrentUserToState();
        if (firebaseFs) {
          await fetchUserProfilesFromFirestore();
        }
        if (state.active === 'chat' && firebaseDb) {
          subscribeToFirebaseChat(state.chatRoom || 'CR-MISSION-01');
        }
        saveToLocalStorage();
        await syncPendingWrites();
        renderAll();
      } catch (error) {
        console.warn(error);
      }
    }

    async function submitLogin(event) {
      event.preventDefault();
      const form = event.currentTarget;
      const data = Object.fromEntries(new FormData(form).entries());
      const login = String(data.login || '').trim();
      const password = String(data.password || '');
      if (!login || !password) {
        setAuthMessage('กรุณากรอก Username และ Password', 'bad');
        return;
      }
      state.authBusy = true;
      renderAuth();
      try {
        let result;
        if (firebaseAuth) {
          const email = await firebaseEmailLookup(login);
          const userCredential = await firebaseAuth.signInWithEmailAndPassword(email, password);
          const uid = userCredential.user.uid;
          const profileDoc = await firebaseFs.collection('userProfiles').doc(uid).get();
          if (!profileDoc.exists) {
            throw new Error('ไม่พบข้อมูลโปรไฟล์ผู้ใช้ในระบบ Firestore');
          }
          const profile = profileDoc.data();
          result = {
            ok: true,
            token: userCredential.user.refreshToken || uid,
            user: {
              UserID: uid,
              Username: profile.Username || login,
              Email: email,
              Role: profile.Role || 'student',
              FirstName: profile.FirstName || '',
              LastName: profile.LastName || '',
              DisplayName: profile.DisplayName || '',
              ClassName: profile.ClassName || '',
              StudentID: profile.StudentID || '',
              HouseholdName: profile.HouseholdStatus || '',
              ConsentStatus: profile.ConsentStatus || 'ยินยอม'
            }
          };
        } else {
          result = sheetApiConfigured()
            ? await sheetApi('loginUser', { login, password })
            : await localLoginUser(login, password);
        }
        await completeAuthSession(result, !!data.remember);
      } catch (remoteError) {
        try {
          const localResult = await localLoginUser(login, password);
          await completeAuthSession(localResult, !!data.remember);
        } catch (localError) {
          state.authBusy = false;
          setAuthMessage(`${remoteError.message || remoteError} ${sheetApiConfigured() ? '| Local: ' + (localError.message || localError) : ''}`, 'bad');
        }
      } finally {
        state.authBusy = false;
      }
    }

    async function submitSignup(event) {
      event.preventDefault();
      const form = event.currentTarget;
      const data = Object.fromEntries(new FormData(form).entries());
      const password = String(data.Password || '');
      const confirm = String(data.ConfirmPassword || '');
      if (password.length < 6) {
        setAuthMessage('Password ต้องมีอย่างน้อย 6 ตัวอักษร', 'bad');
        return;
      }
      if (password !== confirm) {
        setAuthMessage('Password และ Confirm Password ไม่ตรงกัน', 'bad');
        return;
      }
      const user = normalizeAuthUser({
        Username: data.Username,
        Email: data.Email,
        Role: data.Role,
        FirstName: data.FirstName,
        LastName: data.LastName,
        DisplayName: data.DisplayName || `${data.FirstName || ''} ${data.LastName || ''}`.trim(),
        ClassName: data.ClassName,
        StudentID: data.StudentID,
        UserID: data.StudentID || data.Username || data.Email,
        HouseholdName: data.HouseholdName,
        ConsentStatus: data.Consent ? 'ยินยอม' : '',
      });
      state.authBusy = true;
      renderAuth();
      try {
        let result;
        if (firebaseAuth) {
          const usernameClean = String(data.Username || '').trim().toLowerCase();
          const usernameDoc = await firebaseFs.collection('usernames').doc(usernameClean).get();
          if (usernameDoc.exists) {
            throw new Error('Username นี้ถูกใช้งานแล้ว กรุณาเลือกชื่ออื่น');
          }
          if (data.StudentID) {
            const studentClean = String(data.StudentID || '').trim().toLowerCase();
            const studentDoc = await firebaseFs.collection('studentIDs').doc(studentClean).get();
            if (studentDoc.exists) {
              throw new Error('รหัสนักเรียนนี้ถูกลงทะเบียนไว้แล้ว');
            }
          }
          const email = deriveEmail(data.Username || data.StudentID, data.Email);
          const userCredential = await firebaseAuth.createUserWithEmailAndPassword(email, password);
          const uid = userCredential.user.uid;
          
          const profile = {
            UserID: uid,
            Username: data.Username,
            Email: email,
            Role: data.Role,
            FirstName: data.FirstName,
            LastName: data.LastName,
            DisplayName: user.DisplayName,
            ClassName: data.ClassName,
            StudentID: data.StudentID || '',
            HouseholdStatus: data.HouseholdName || '',
            ConsentStatus: data.Consent ? 'ยินยอม' : '',
            CurrentLevel: 'Green Starter',
            CurrentEXP: 0,
            TotalScore: 0,
            TotalStars: 0,
            TotalBadges: 0,
            TotalPosts: 0,
            TotalComments: 0,
            TotalSubmissions: 0,
            TotalCO2e: 0,
            LastActiveAt: nowStamp()
          };
          
          const batch = firebaseFs.batch();
          batch.set(firebaseFs.collection('userProfiles').doc(uid), profile);
          batch.set(firebaseFs.collection('usernames').doc(usernameClean), { email: email, uid: uid });
          if (data.StudentID) {
            const studentClean = String(data.StudentID || '').trim().toLowerCase();
            batch.set(firebaseFs.collection('studentIDs').doc(studentClean), { email: email, uid: uid });
          }
          await batch.commit();
          
          result = {
            ok: true,
            token: userCredential.user.refreshToken || uid,
            user: {
              UserID: uid,
              Username: data.Username,
              Email: email,
              Role: data.Role,
              FirstName: data.FirstName,
              LastName: data.LastName,
              DisplayName: user.DisplayName,
              ClassName: data.ClassName,
              StudentID: data.StudentID || '',
              HouseholdName: data.HouseholdName || '',
              ConsentStatus: data.Consent ? 'ยินยอม' : ''
            }
          };
        } else {
          result = sheetApiConfigured()
            ? await sheetApi('signupUser', { user, password })
            : await localSignupUser(user, password);
        }
        await completeAuthSession(result, true);
      } catch (remoteError) {
        try {
          const localResult = await localSignupUser(user, password);
          await completeAuthSession(localResult, true);
          alert('สมัครบัญชีในเครื่องสำเร็จ แต่ยังไม่ได้บันทึกไป Google Sheets/Firebase: ' + (remoteError.message || remoteError));
        } catch (localError) {
          state.authBusy = false;
          setAuthMessage(`${remoteError.message || remoteError} | Local: ${localError.message || localError}`, 'bad');
        }
      } finally {
        state.authBusy = false;
      }
    }

    async function logout() {
      const token = state.authToken;
      clearAuthSession();
      state.active = 'home';
      if (firebaseAuth) {
        try { await firebaseAuth.signOut(); } catch (e) {}
      }
      if (currentChatSubscription) {
        currentChatSubscription.off();
        currentChatSubscription = null;
      }
      renderAuth();
      if (sheetApiConfigured() && token && !firebaseAuth) {
        try { await sheetApi('logoutUser', { token }); } catch (e) {}
      }
    }

    function hydrateData(data = {}) {
      state.data = Object.assign(state.data, data);
      state.data.wasteRecords = (data.wasteRecords || []).map(normalizeRow);
      state.data.gameScores = (data.gameScores || []).map(normalizeRow);
      state.data.carbonFactors = (data.carbonFactors?.length ? data.carbonFactors : state.data.carbonFactors).map(normalizeRow);
      state.data.householdSummary = data.householdSummary || summarizeHouseholds(state.data.wasteRecords);
      state.data.dashboard = data.dashboard || buildDashboard(state.data.wasteRecords, state.data.householdSummary);
      state.data.communityPosts = (data.communityPosts || state.data.communityPosts || []).map(normalizeRow);
      state.data.postComments = (data.postComments || state.data.postComments || []).map(normalizeRow);
      state.data.chatMessages = (data.chatMessages || state.data.chatMessages || []).map(normalizeRow);
      state.data.chatRooms = (data.chatRooms?.length ? data.chatRooms : state.data.chatRooms?.length ? state.data.chatRooms : defaultChatRooms()).map(normalizeRow);
      state.data.userProfiles = (data.userProfiles || state.data.userProfiles || []).map(normalizeRow);
      state.data.levelRules = (data.levelRules?.length ? data.levelRules : state.data.levelRules?.length ? state.data.levelRules : defaultLevelRules()).map(normalizeRow);
      state.data.expLogs = (data.expLogs || state.data.expLogs || []).map(normalizeRow);
      state.data.carbonFactors?.forEach((factor) => {
        const field = activityFields.find((a) => a[1] === factor.ActivityName || a[0] === factor.ActivityCode)?.[0];
        if (field) factorMap[field] = Number(factor.EF || factorMap[field] || 0);
      });
    }

    function renderNav() {
      const side = document.getElementById('sideNav');
      const mobile = document.getElementById('mobileNav');
      const navPages = mainNavPages();
      side.innerHTML = navPages.map(([id, label, icon]) => `<button class="nav-btn" data-page="${id}" title="${label}">${icons[icon]}<span>${label}</span></button>`).join('');
      mobile.innerHTML = navPages.slice(0, 5).map(([id, label, icon]) => `<button data-page="${id}" title="${label}">${icons[icon]}<span>${shortLabel(label)}</span></button>`).join('');
      document.querySelectorAll('[data-page]').forEach((btn) => btn.addEventListener('click', () => showPage(btn.dataset.page)));
    }

    function shortLabel(label) {
      return label.replace('ข้อมูลขยะ', '').replace('Trash Hero Academy', 'เกม').replace('Leaderboard', 'อันดับ');
    }

    function showPage(page) {
      if (!isAuthenticated()) {
        renderAuth();
        return;
      }
      state.active = page;
      document.body.classList.toggle('chat-active', page === 'chat');
      renderAll();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderAll() {
      if (!isAuthenticated()) {
        renderAuth();
        return;

      const current = pages.find(([id]) => id === state.active);

      document.body.classList.toggle('chat-active', state.active === 'chat');

      document.getElementById('globalCarbon').textContent = format(state.data.dashboard.totalCO2e || 0);
      renderAuthUserChip();
      document.querySelectorAll('.section').forEach((s) => s.classList.toggle('active', s.id === state.active));
      document.querySelectorAll('[data-page]').forEach((b) => b.classList.toggle('active', b.dataset.page === state.active));
      const renderers = {
        home: renderHome,
        record: renderRecord,
        guide: renderGuide,
        game: renderGame,
        leaderboard: renderLeaderboard,
        community: renderCommunity,
        friends: renderFriends,
        chat: renderChat,
        profile: renderProfile,
        impact: renderImpact,
        dashboard: renderDashboard,
        compare: renderCompare,
        formula: renderFormula,

      renderAll();

    function renderRecord() {
      const month = new Date().toISOString().slice(0, 7);
      const defaults = authRecordDefaults();
      document.getElementById('record').innerHTML = `
        <div class="grid record-layout">
          <form class="panel" id="recordForm">
            <h3>ข้อมูลนักเรียนและครัวเรือน</h3>

              ${input('StudentID', 'เลขที่หรือรหัสนักเรียน', 'text', true, defaults.StudentID)}
              ${input('HouseholdName', 'ชื่อครัวเรือน', 'text', true, defaults.HouseholdName)}
              ${input('ReportMonth', 'เดือนที่รายงานผล', 'month', true, month)}
            </div>
            <div class="form-group">
              <h3>ปริมาณขยะ 4 ประเภท</h3>
              <div class="field-grid">
                ${input('GeneralWasteKg', 'ขยะทั่วไป (kg)', 'number')}
                ${input('RecycleWasteKg', 'ขยะรีไซเคิล (kg)', 'number')}
                ${input('OrganicWasteKg', 'ขยะอินทรีย์/เศษอาหาร (kg)', 'number')}
                ${input('HazardousWasteAmount', 'ขยะอันตราย (ชิ้นหรือ kg)', 'number')}
              </div>
            </div>
            <div class="form-group">
              <h3>กิจกรรมจัดการขยะเพิ่มเติม</h3>
              <div class="activity-grid">
                ${activityFields.map(([field, label, unit]) => input(field, `${label} (${unit})`, 'number')).join('')}
              </div>
            </div>
            <div class="form-group">
              <h3>หลักฐานและความยินยอม</h3>
              <div class="field-grid">
                <label>อัปโหลดรูปภาพหลักฐาน<input id="EvidenceFiles" name="EvidenceFiles" type="file" accept="image/*" multiple></label>
                ${input('VideoLink', 'ลิงก์วิดีโอเพิ่มเติม', 'url')}
              </div>
              <div class="privacy-box" style="margin-top:12px">
                <label><span><input type="checkbox" name="Consent" required style="width:auto;min-height:auto"> ข้าพเจ้ายินยอมให้โรงเรียนใช้ข้อมูลและภาพหลักฐานที่ส่งผ่านระบบ Green Passport เพื่อการติดตามผลโครงการด้านสิ่งแวดล้อม การจัดทำรายงาน และการนำเสนอผลงานทางการศึกษา โดยโรงเรียนจะใช้ข้อมูลอย่างเหมาะสมและไม่เปิดเผยข้อมูลส่วนบุคคลต่อสาธารณะโดยไม่จำเป็น</span></label>

          </form>
          <div class="result-box">

            <div class="number"><span id="liveCo2e">0.00</span></div>
            <p>kgCO₂e จากกิจกรรมที่บันทึก</p>
            <div style="margin-top:12px">${greenBuddy('<span id="liveAdvice">กรอกกิจกรรมเพื่อดูคำแนะนำอัตโนมัติ</span>', true)}</div>
            <div class="panel" style="margin-top:14px">
              <h3>สถานะ Google Sheets</h3>
              <p>${sheetApiConfigured() ? 'เชื่อมต่อ Google Sheets Web App พร้อมบันทึกลงชีต' : 'ยังไม่ได้ตั้งค่า endpoint สำหรับเขียนข้อมูล: เปิดด้วย ?api=WEB_APP_URL หลัง deploy Code.gs'}</p>

          </div>
        </div>`;
      const form = document.getElementById('recordForm');
      form.addEventListener('input', updateLiveCarbon);
      form.addEventListener('submit', submitRecord);
      updateLiveCarbon();
    }

    function input(name, label, type, required, value = '') {
      const step = type === 'number' ? ' step="0.01" min="0"' : '';
      return `<label>${label}<input name="${name}" type="${type}" value="${value}" ${required ? 'required' : ''}${step}></label>`;
    }

    function updateLiveCarbon() {
      const form = document.getElementById('recordForm');
      if (!form) return;
      const data = Object.fromEntries(new FormData(form).entries());
      const co2e = calculateCo2e(data);
      document.getElementById('liveCo2e').textContent = format(co2e);
      document.getElementById('liveAdvice').textContent = advice(data, co2e);
    }

    async function submitRecord(event) {
      event.preventDefault();
      const form = event.currentTarget;
      const data = Object.fromEntries(new FormData(form).entries());
      data.TotalCO2e = calculateCo2e(data);
      data.EvidenceFiles = await filesToPayload(document.getElementById('EvidenceFiles').files);
      if (!data.EvidenceFiles.length) {
        alert('กรุณาแนบรูปภาพหลักฐานอย่างน้อย 1 รูป');
        return;
      }
      try {
        const result = await sheetApi('appendWasteRecord', { record: data });
        if (result.record) state.data.wasteRecords.push(normalizeRow(result.record));
        refreshLocalDashboard();
        saveToLocalStorage();
        alert(`บันทึกลง Google Sheets สำเร็จ\nลดคาร์บอน ${format(result.totalCO2e || data.TotalCO2e)} kgCO₂e\n${result.message || advice(data, data.TotalCO2e)}`);
        form.reset();
        renderAll();
      } catch (error) {
        queuePendingWrite('appendWasteRecord', { record: data });
        alert('ยังบันทึกลง Google Sheets ไม่สำเร็จ ระบบเก็บคำขอนี้ไว้เพื่อส่งซ้ำเมื่อ endpoint พร้อม: ' + error.message);
      }
    }

    function filesToPayload(files) {
      return Promise.all([...files].map((file) => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve({ name: file.name, mimeType: file.type, data: reader.result });
        reader.onerror = reject;
        reader.readAsDataURL(file);
      })));
    }

    function calculateCo2e(data) {
      return round(activityFields.reduce((total, [field]) => total + Number(data[field] || 0) * Number(factorMap[field] || 0), 0));
    }

    function advice(data, co2e) {
      if (Number(data.GeneralWasteKg || 0) > 10) return '🗑️ ขยะทั่วไปยังสูง ลองลดซองขนม ถุงพลาสติก และของใช้ครั้งเดียวทิ้งนะ';
      if (Number(data.OrganicWasteKg || 0) > Number(data.CompostFoodKg || 0) + Number(data.BioExtractKg || 0) + Number(data.FeedAnimalsKg || 0)) return '🍃 ขยะอินทรีย์เยอะมาก ลองทำถังหมักปุ๋ยหรือน้ำหมักชีวภาพที่บ้านกันเถอะ';
      if (Number(data.RecycleWasteKg || 0) > 0 && Number(data.RecycleWasteKg || 0) < 3) return '♻️ เดือนนี้ขยะรีไซเคิลยังน้อย ลองตั้งมุมแยกขวด กระดาษ และกระป๋องในบ้านนะ';

    function createInitialGameState() {
      return {
        screen: 'start',
        profile: { firstName: '', lastName: '', className: '', studentId: '', teamName: 'Green Team' },
        currentStage: 0,
        currentItem: 0,
        correctCount: 0,
        soundOn: false,
        feedback: null,
        stageResults: gameStages.map((stage) => ({
          stageId: stage.id,
          name: stage.name,
          score: 0,
          stars: 0,
          completed: false,
          badge: '',
        })),
        latestResult: null,
        saved: false,
      };
    }

    function renderGame() {
      const view = {
        start: renderGameStart,
        profile: renderGameProfile,
        map: renderMissionMap,
        play: renderStagePlay,
        summary: renderStageSummary,
        certificate: renderGameCertificate,
      }[state.game.screen] || renderGameStart;
      document.getElementById('game').innerHTML = view();
    }

    function renderGameStart() {
      return `
        <div class="game-hero">
          <div>

            <p class="notice">สวัสดีฮีโร่ตัวน้อย! วันนี้เรามาช่วยโลกด้วยการแยกขยะกันเถอะ 🌱</p>

              <button class="btn" onclick="goGameScreen('profile'); playGameSound('button')">🌱 เริ่มภารกิจ</button>
              <button class="btn ghost" onclick="goGameScreen('map'); playGameSound('button')">🗺️ ดูแผนที่เกม</button>
            </div>
            ${soundToggleButton()}
          </div>
          <div class="hero-badge-art">${greenBuddy('ฉันคือน้องใบไม้ Green Buddy จะช่วยแนะนำทุกด่านให้สนุกและแยกขยะได้ถูกถัง 💚')}</div>
        </div>
        ${renderWasteIcons()}
        ${renderKnowledgeCards()}
        <div class="grid three" style="margin-top:16px">
          <div class="card"><h3>🗺️ 9 ด่านภารกิจ</h3><p>แยกขยะ 3Rs คาร์บอน ภารกิจที่บ้าน และบททดสอบสุดท้าย</p></div>
          <div class="card"><h3>⭐ คะแนน ดาว Badge</h3><p>ผ่านด่านเพื่อสะสมดาวและปลดล็อกตำแหน่งฮีโร่</p></div>
          <div class="card"><h3>🏡 School to Home</h3><p>นำความรู้ไปใช้จริงที่บ้านและบันทึกผลใน Green Passport</p></div>
        </div>`;

    function renderGameProfile() {
      const p = state.game.profile;
      const total = gameTotals();
      return `
        <form class="panel" id="gameProfileForm" onsubmit="saveGameProfile(event)">
          <h3>🌱 โปรไฟล์ผู้เล่น</h3>
          ${greenBuddy('กรอกชื่อทีมของเธอ แล้วเราไปเปิดแผนที่ภารกิจด้วยกันนะ 💚', true)}

            <label>ชื่อ<input name="firstName" required value="${escapeAttr(p.firstName)}"></label>

            <button class="btn ghost" type="button" onclick="goGameScreen('start')">กลับหน้าเริ่มเกม</button>
