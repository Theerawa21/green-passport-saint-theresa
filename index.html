<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Green Passport - St. Theresa Zero Waste</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600;700&family=Sarabun:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/app.css">
  <!-- Firebase SDK (Compat Version) -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="auth-locked">
  <section id="authScreen" class="auth-screen" aria-live="polite"></section>
  <div class="app">
    <aside>
      <div class="brand">
        <div class="brand-logos">
          <div class="logo-slot"><img src="./assets/images/school-logo.webp" alt="Green Passport St. Theresa Zero Waste"></div>
          <div class="logo-slot school-logo"><img src="./assets/images/inline-image-2.webp" alt="ตราโรงเรียนเซนต์เทเรซา"></div>
        </div>
        <div>
          <h1>Green Passport</h1>
          <p>St. Theresa Zero Waste</p>
        </div>
      </div>
      <nav id="sideNav"></nav>
      <div class="sidebar-footer">
        <div id="authUserChip" class="auth-user-chip sidebar-user-chip" data-auth-user-chip hidden></div>
      </div>
    </aside>

    <main>
      <div class="topbar">
        <div class="page-title">
          <h2 id="pageTitle">Green Passport</h2>
          <p id="pageSubtitle">บันทึกการจัดการขยะ คำนวณการลดคาร์บอน และสร้างครัวเรือนต้นแบบ Zero Waste</p>
        </div>
        <div class="topbar-actions">
          <div class="auth-user-chip mobile-user-chip" data-auth-user-chip hidden></div>
          <div class="carbon-pill">
            <div>คาร์บอนสะสมทั้งโครงการ</div>
            <strong id="globalCarbon">0.00</strong> kgCO₂e
          </div>
        </div>
      </div>

      <section id="home" class="section active"></section>
      <section id="record" class="section"></section>
      <section id="guide" class="section"></section>
      <section id="game" class="section"></section>
      <section id="leaderboard" class="section"></section>
      <section id="community" class="section"></section>
      <section id="friends" class="section"></section>
      <section id="chat" class="section"></section>
      <section id="profile" class="section"></section>
      <section id="impact" class="section"></section>
      <section id="dashboard" class="section"></section>
      <section id="compare" class="section"></section>
      <section id="formula" class="section"></section>
      <section id="missions" class="section"></section>
      <section id="reminders" class="section"></section>
      <section id="studentRoles" class="section"></section>
      <section id="starterKit" class="section"></section>
      <section id="certificate" class="section"></section>
      <section id="admin" class="section"></section>
    </main>
  </div>
  <div class="mobile-nav" id="mobileNav"></div>

  <script src="./site.config.js"></script>
  <script src="./assets/js/app.bundle.js"></script>

  <!-- Custom Alert Modal -->
  <div id="customAlertModal" class="custom-alert-overlay" style="display: none;">
    <div class="custom-alert-box">
      <div class="custom-alert-header">
        <div class="custom-alert-icon info">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 111.063.852l-.708 2.836a.75.75 0 001.063.852l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z" />
          </svg>
        </div>
        <div class="custom-alert-title">การแจ้งเตือนจากระบบ</div>
      </div>
      <div class="custom-alert-body" id="customAlertMessage"></div>
      <div class="custom-alert-actions">
        <button class="btn" onclick="closeCustomAlert()">ตกลง</button>
      </div>
    </div>
  </div>

  <!-- Custom Confirm Modal -->
  <div id="customConfirmModal" class="custom-alert-overlay" style="display: none;">
    <div class="custom-alert-box">
      <div class="custom-alert-header">
        <div class="custom-alert-icon confirm">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9 5.25h.008v.008H12v-.008z" />
          </svg>
        </div>
        <div class="custom-alert-title" id="customConfirmTitle">ยืนยันการดำเนินการ</div>
      </div>
      <div class="custom-alert-body" id="customConfirmMessage"></div>
      <div class="custom-alert-actions">
        <button class="btn ghost" id="customConfirmCancelBtn">ยกเลิก</button>
        <button class="btn" id="customConfirmOkBtn">ยืนยัน</button>
      </div>
    </div>
  </div>
</body>
</html>
