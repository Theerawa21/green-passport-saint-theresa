    function renderMissionMap() {
      const g = state.game;
      const total = gameTotals();
      const level = playerLevelInfo(total.score);
      return `
        <div class="grid two game-map-head">
          <div class="panel">
            <h3>🗺️ แผนที่ภารกิจ</h3>
            <p>ผ่านด่านก่อนหน้าเพื่อปลดล็อกด่านถัดไป ด่านที่ผ่านแล้วสามารถเล่นซ้ำเพื่อฝึกได้</p>
            ${greenBuddy('เดินตามเส้นทาง 9 ด่าน เก็บดาว และนำความรู้กลับไปใช้ที่บ้านนะ 🏡', true)}
          </div>
          <div class="panel">
            <h3>🏆 สรุปผู้เล่น</h3>
            <div class="score-strip">
              <div class="card kpi"><span>คะแนนรวม</span><strong>${total.score}</strong></div>
              <div class="card kpi"><span>ดาวรวม</span><strong>${total.stars}</strong></div>
              <div class="card kpi"><span>ระดับ</span><strong style="font-size:20px">${level.emoji} ${level.name}</strong></div>
            </div>
            <div class="level-chip active" style="margin-top:12px">
              <div class="emoji">${level.emoji}</div>
              <strong>${level.name}</strong>
              <span>${level.text}</span>
            </div>
            ${soundToggleButton()}
          </div>
        </div>
        <div class="mission-map" style="margin-top:16px">
          ${gameStages.map((stage, index) => missionCard(stage, index)).join('')}
        </div>
        <div class="btn-row" style="margin-top:16px">
          <button class="btn ghost" onclick="goGameScreen('profile')">แก้ไขโปรไฟล์</button>
          <button class="btn secondary" onclick="showPage('leaderboard')">ดู Leaderboard</button>
          ${allStagesComplete() ? `<button class="btn yellow" onclick="goGameScreen('certificate')">ออกเกียรติบัตร</button>` : ''}
        </div>`;
    }

    function missionCard(stage, index) {
      const result = state.game.stageResults[index];
      const unlocked = index === 0 || state.game.stageResults[index - 1].completed;
      const active = index === state.game.currentStage && !result.completed;
      const status = result.completed ? 'ผ่านแล้ว' : unlocked ? 'พร้อมเล่น' : 'ล็อก';
      const visual = stageVisual(stage);
      return `
        <button class="mission-card ${stage.type} ${result.completed ? 'completed' : ''} ${active ? 'active-stage' : ''}" ${unlocked ? '' : 'disabled'} onclick="startStage(${index})">
          <div class="mission-icon">${result.completed ? '✅' : visual.icon}</div>
          <strong>ด่าน ${stage.id}: ${stage.name}</strong>
          <span>${stage.thaiName}</span>
          <small>${visual.label} | ${status} | ${result.score} คะแนน</small>
          <span class="mission-stars">${starText(result.stars)}</span>
          ${result.badge ? `<span class="badge earned">${result.badge}</span>` : ''}
        </button>`;
    }

    function renderStagePlay() {
      const g = state.game;
      const stage = gameStages[g.currentStage];
      const item = stage.items[g.currentItem];
      const answeredOffset = g.feedback ? 1 : 0;
      const progress = ((g.currentItem + answeredOffset) / stage.items.length) * 100;
      const remaining = Math.max(0, stage.items.length - g.currentItem - answeredOffset);
      const visual = stageVisual(stage);
      return `
        <div class="grid two">
          <div class="panel">
            <h3>${visual.emoji} ด่าน ${stage.id}: ${stage.name}</h3>
            <p>${stage.thaiName} | ${stage.intro}</p>
            <div class="score-meter"><span style="width:${progress}%"></span></div>
            <p style="margin-top:10px">ข้อ ${g.currentItem + 1} / ${stage.items.length}</p>
            <div class="stage-box">
              <h3>${item.prompt}</h3>
              <div class="choices">${item.choices.map((choice, i) => {
                const selected = g.feedback && g.feedback.choiceIndex === i;
                const correctChoice = g.feedback && item.answer === i;
                const className = g.feedback ? (correctChoice ? 'correct-choice' : selected ? 'wrong-choice' : '') : '';
                return `<button class="choice ${className}" onclick="answerStage(${i})">${choice}</button>`;
              }).join('')}</div>
              ${g.feedback ? `<div class="feedback-box ${g.feedback.correct ? 'correct' : 'wrong'}">${g.feedback.text}<br><small>${g.feedback.correct ? 'ปิ๊ง! เก็บดาวความรู้เพิ่มอีกดวง ⭐' : 'คำใบ้: สังเกตสีถังและชนิดขยะก่อนตอบอีกครั้ง'}</small></div>` : ''}
            </div>
          </div>
          <div class="panel">
            <h3>📌 สถานะด่าน</h3>
            <div class="score-strip">
              <div class="card kpi"><span>ตอบถูก</span><strong>${g.correctCount}</strong></div>
              <div class="card kpi"><span>ข้อที่เหลือ</span><strong>${remaining}</strong></div>
              <div class="card kpi"><span>Badge</span><strong style="font-size:20px">${stage.badge}</strong></div>
            </div>
            <div class="waste-type ${stage.type}" style="margin-top:12px">
              <div class="emoji">${visual.emoji}</div>
              <strong>${visual.label}</strong>
              <small>${visual.hint}</small>
            </div>
            <div class="buddy-corner">${greenBuddy(g.feedback ? g.feedback.text : 'เลือกคำตอบที่ตรงกับชนิดขยะ แล้วฉันจะช่วยให้คำใบ้นะ 💚', true)}</div>
            <div class="btn-row" style="margin-top:16px">
              <button class="btn ghost" onclick="goGameScreen('map')">กลับแผนที่</button>
              <button class="btn ghost" onclick="startStage(${g.currentStage})">เล่นด่านนี้ใหม่</button>
            </div>
            ${soundToggleButton()}
          </div>
        </div>`;
    }

    function renderStageSummary() {
      const result = state.game.latestResult;
      const total = gameTotals();
      return `
        <div class="panel stage-result-card">
          <h3>ภารกิจสำเร็จ! ${starText(result.stars)}</h3>
          <p>เธอได้รับดาวและ Badge ใหม่แล้ว 🏆</p>
          <div class="badge-medal">${result.badge.includes('ลองใหม่') ? '💚' : '🏅'}</div>
          <div class="grid four">
            ${kpi('คะแนนด่านนี้', result.score, 'คะแนน')}
            ${kpi('ดาว', starText(result.stars), '')}
            ${kpi('Badge', result.badge, '')}
            ${kpi('คะแนนรวม', total.score, 'คะแนน')}

            <button class="btn ghost" onclick="startStage(${result.stageIndex})">เล่นอีกครั้ง</button>
            ${result.stageIndex < gameStages.length - 1 ? `<button class="btn" onclick="startStage(${result.stageIndex + 1})">ไปด่านถัดไป</button>` : ''}
            <button class="btn secondary" onclick="goGameScreen('map')">กลับหน้าแผนที่ภารกิจ</button>
            ${allStagesComplete() ? `<button class="btn yellow" onclick="saveGameScore()">บันทึกคะแนนและออกเกียรติบัตร</button>` : ''}
          </div>
        </div>`;
    }

    function renderGameCertificate() {
      const total = gameTotals();
      const fullName = playerFullName();
      return `
        <div class="grid two">
          <div class="panel">
            <h3>เกียรติบัตร Trash Hero Academy</h3>
            <p>เมื่อผ่านครบ 9 ด่านและบันทึกคะแนนแล้ว สามารถพิมพ์เกียรติบัตรนี้ได้</p>

            <p>คะแนนรวม ${total.score} คะแนน | ดาวรวม ${starText(total.stars)}</p>
            <p>ผ่านภารกิจฮีโร่พิทักษ์โลก และมีความรู้ด้านการแยกขยะ การลดขยะ และการลดคาร์บอน</p>
            <div>${greenBuddy('ครัวเรือนของคุณคือพลังสีเขียวของโลก 💚', true)}</div>
            <p>วันที่ออกเกียรติบัตร ${new Date().toLocaleDateString('th-TH')}</p>
          </div>
        </div>`;
    }

    function goGameScreen(screen) {
      state.game.screen = screen;
      renderGame();
    }

    function saveGameProfile(event) {
      event.preventDefault();
      const data = Object.fromEntries(new FormData(event.currentTarget).entries());
      state.game.profile = {
        firstName: data.firstName || '',
        lastName: data.lastName || '',
        className: data.className || '',
        studentId: data.studentId || '',
        teamName: data.teamName || 'Green Team',
      };
      playGameSound('button');
      goGameScreen('map');
    }

    function startStage(index) {
      if (index > 0 && !state.game.stageResults[index - 1].completed) return;
      state.game.currentStage = index;
      state.game.currentItem = 0;
      state.game.correctCount = 0;
      state.game.feedback = null;
      state.game.screen = 'play';
      playGameSound('stage');
      renderGame();
    }

    function answerStage(choiceIndex) {
      const g = state.game;
      const stage = gameStages[g.currentStage];
      const item = stage.items[g.currentItem];
      const correct = choiceIndex === item.answer;
      if (correct) g.correctCount += 1;
      g.feedback = {
        correct,
        choiceIndex,
        text: correct ? correctFeedback[g.currentItem % correctFeedback.length] : wrongFeedback[g.currentItem % wrongFeedback.length],
      };
      playGameSound(correct ? 'correct' : 'wrong');
      renderGame();
      setTimeout(() => advanceStageItem(), 950);
    }

    function advanceStageItem() {
      const g = state.game;
      const stage = gameStages[g.currentStage];
      g.currentItem += 1;
      g.feedback = null;
      if (g.currentItem >= stage.items.length) {
        finishStage();
      } else {
        renderGame();
      }
    }

    function finishStage() {
      const g = state.game;
      const stage = gameStages[g.currentStage];
      const accuracy = g.correctCount / stage.items.length;
      const score = Math.min(100, Math.round(accuracy * 70 + 20 + 10));
      const stars = stageStars(score);
      const badge = stars > 0 ? stage.badge : '';
      if (badge) playGameSound('badge');
      g.stageResults[g.currentStage] = {
        stageId: stage.id,
        name: stage.name,
        score,
        stars,
        completed: stars > 0,
        badge,
      };
      g.latestResult = {
        stageIndex: g.currentStage,
        score,
        stars,
        badge: badge || 'ลองใหม่เพื่อรับ Badge',
        message: stars > 0 ? `ยินดีด้วย! คุณได้รับ Badge ใหม่ 🏆 ${badge}` : 'ยังไม่ผ่านด่านนี้ ลองเล่นอีกครั้งเพื่อสะสมดาว 💚',
        buddyAdvice: stars > 0 ? 'Green Buddy บอกว่า: อย่าลืมนำความรู้เรื่องขยะไปใช้ที่บ้านนะ ♻️' : 'Green Buddy บอกว่า: ฮีโร่ไม่ยอมแพ้ ลองสังเกตคำใบ้อีกครั้งนะ 💚',
        homeTip: stage.id === 7 ? 'ชวนครอบครัวตั้งมุมแยกขยะที่บ้านได้เลย 🏡' : 'เริ่มจากแยกขยะ 5 ถังให้ถูกสี แล้วบันทึกผลใน Green Passport 📸',
      };
      g.screen = 'summary';
      renderGame();
    }

    function resetGame() {
      state.game = createInitialGameState();
      renderGame();
    }

    function stageStars(score) {
      if (score >= 90) return 3;
      if (score >= 70) return 2;
      if (score >= 50) return 1;
      return 0;
    }

    function gameTotals() {
      return state.game.stageResults.reduce((total, result) => {
        total.score += Number(result.score || 0);
        total.stars += Number(result.stars || 0);
        return total;
      }, { score: 0, stars: 0 });
    }

    function allStagesComplete() {
      return state.game.stageResults.every((result) => result.completed);
    }

    function playerLevel(score) {
      return playerLevelInfo(score).name;
    }

    function playerFullName() {
      return `${state.game.profile.firstName || ''} ${state.game.profile.lastName || ''}`.trim();
    }

    function saveGameScore() {
      const total = gameTotals();
      const latest = state.game.stageResults.filter((r) => r.completed).at(-1) || {};
      const badges = state.game.stageResults.map((r) => r.badge).filter(Boolean);
      const score = {
        FirstName: state.game.profile.firstName || 'นักเรียน',
        LastName: state.game.profile.lastName || 'ตัวอย่าง',
        FullName: playerFullName() || 'นักเรียนตัวอย่าง',
        ClassName: state.game.profile.className || 'ป.5/1',
        StudentID: state.game.profile.studentId || 'ST0000',
        TeamName: state.game.profile.teamName || 'Green Team',
        TotalScore: total.score,
        TotalStars: total.stars,
        PlayerLevel: playerLevel(total.score),
        LatestStage: latest.name || '',
        LatestStageScore: Number(latest.score || 0),
        LatestStageStars: Number(latest.stars || 0),
        Badges: badges.join(', '),
        CertificateStatus: allStagesComplete() ? 'พร้อมออกเกียรติบัตร' : 'ยังไม่ผ่านครบ 9 ด่าน',
      };
      state.game.stageResults.forEach((result, index) => {
        score[`Stage${index + 1}Score`] = Number(result.score || 0);
        score[`Stage${index + 1}Stars`] = Number(result.stars || 0);
      });
      sheetApi('appendGameScore', { score }).then((result) => {
        if (result.score) state.data.gameScores.push(normalizeRow(result.score));
        if (result.gameScores) state.data.gameScores = result.gameScores.map(normalizeRow);
        state.game.saved = true;
        saveToLocalStorage();
        playGameSound('finish');
        alert('บันทึกคะแนนเกมลง Google Sheets เรียบร้อย ✅\nยินดีด้วย! คุณได้รับ Badge ใหม่ 🏆');
        goGameScreen(allStagesComplete() ? 'certificate' : 'map');
      }).catch((error) => {
        queuePendingWrite('appendGameScore', { score });
        state.game.saved = true;
        playGameSound('finish');
        alert('ยังบันทึกคะแนนลง Google Sheets ไม่สำเร็จ ระบบเก็บคำขอไว้เพื่อส่งซ้ำเมื่อ endpoint พร้อม: ' + error.message);
        goGameScreen(allStagesComplete() ? 'certificate' : 'map');
      });
    }

    function escapeAttr(value) {
      return String(value || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
    }

    function escapeHtml(value) {
      return String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function jsString(value) {
      return JSON.stringify(String(value || '')).replace(/</g, '\\u003c');
    }

    function domId(value) {
      return String(value || '').replace(/[^a-zA-Z0-9_-]/g, '-');
    }

    function nowStamp() {
      return new Date().toLocaleString('th-TH');
    }

      const topCarbon = [...state.data.householdSummary].sort((a, b) => b.TotalCO2e - a.TotalCO2e);

      document.getElementById('leaderboard').innerHTML = `
        <div class="grid two">

          <div class="panel"><h3>Leaderboard เกม</h3>${rankCards(topGame, 'game')}</div>
        </div>`;

      return rows.map((r, i) => `<div class="card" style="margin-bottom:10px">
        <div class="btn-row" style="justify-content:space-between">
          <strong>${medal[i] || '⭐'} อันดับ ${i + 1}: ${type === 'carbon' ? r.HouseholdName : r.FullName}</strong>
          <span class="badge earned">${type === 'carbon' ? format(r.TotalCO2e) + ' kgCO₂e 🌍' : r.TotalScore + ' คะแนน'}</span>
        </div>
        <p>${r.ClassName || ''} ${type === 'carbon' ? `ส่ง ${r.TotalSubmissions} ครั้ง 🍃` : `${starText(r.TotalStars)} | ${r.PlayerLevel}`}</p>
      </div>`).join('');
    }

    function statusIsPublished(status) {
      const text = String(status || '');
      return text.includes('เผยแพร่') || text.includes('ผ่านการตรวจ');

    function statusIsHidden(status) {
      const text = String(status || '');
      return text.includes('ซ่อน') || text.includes('ลบ') || text.includes('ไม่เหมาะสม');
    }

    function truthy(value) {
      return value === true || String(value).toLowerCase() === 'true' || String(value).includes('ใช่') || String(value).includes('ปัก');

    async function submitCommunityPost(event) {
      event.preventDefault();
      const form = event.currentTarget;
      const data = Object.fromEntries(new FormData(form).entries());
      if (!communityRulesAccepted() && !data.CommunityRulesConsent) {
        alert('กรุณายอมรับกติกาชุมชนก่อนส่งโพสต์');
        return;
      }
      if (String(data.PostContent || '').trim().length < 20) {
        alert('กรุณาเล่าประสบการณ์ให้ละเอียดขึ้นเล็กน้อย เพื่อให้เพื่อนนำไปทำตามได้');
        return;
      }
      localStorage.setItem('greenPassportCommunityRules', 'accepted');
      const post = {
        PostID: `CP-${Date.now()}`,
        Timestamp: nowStamp(),
        UserID: data.UserID || data.DisplayName || 'guest',
        DisplayName: data.DisplayName,
        ClassName: data.ClassName,
        Category: data.Category,
        PostTitle: data.PostTitle,
        PostContent: data.PostContent,
        MethodUsed: data.MethodUsed,
        Result: data.Result,
        Problem: data.Problem,
        Solution: data.Solution,
        AdviceToFriends: data.AdviceToFriends,
        ImageLinks: data.ImageLinks,
        Tags: data.Tags,
        Likes: 0,
        CommentCount: 0,
        ReviewStatus: 'รอตรวจสอบ',
        TeacherComment: '',
        ApprovedBy: '',
        ApprovedAt: '',
      };
      try {
        const result = await sheetApi('appendCommunityPost', { post });
        state.data.communityPosts.push(normalizeRow(result.post || post));
        alert('ส่งโพสต์แล้ว รอครูตรวจสอบก่อนเผยแพร่');
      } catch (error) {
        state.data.communityPosts.push(normalizeRow(post));
        queuePendingWrite('appendCommunityPost', { post });
        alert('บันทึกโพสต์ไว้ในเครื่องแล้ว และจะส่งเข้า Google Sheets เมื่อเชื่อมต่อได้: ' + error.message);
      }
      saveToLocalStorage();
      form.reset();
      renderCommunity();
    }

    async function encouragePost(postId) {
      const post = (state.data.communityPosts || []).find((item) => item.PostID === postId);
      if (post) post.Likes = Number(post.Likes || 0) + 1;
      try {
        const result = await sheetApi('sendCommunityLike', { postId });
        if (result.post && post) Object.assign(post, normalizeRow(result.post));
      } catch (error) {
        queuePendingWrite('sendCommunityLike', { postId });
      }
      saveToLocalStorage();
      renderCommunity();
    }

      const safe = domId(postId);
      const identity = currentUserIdentity();
      const name = identity.DisplayName || document.getElementById(`comment-name-${safe}`)?.value.trim();
      const text = document.getElementById(`comment-text-${safe}`)?.value.trim();
      if (!name || !text) {
        alert('กรุณากรอกชื่อและความคิดเห็น');
        return;
      }
      const comment = {
        CommentID: `CM-${Date.now()}`,
        PostID: postId,
        Timestamp: nowStamp(),
        UserID: identity.UserID || name,
        DisplayName: name,
        ClassName: identity.ClassName || '',
        CommentText: text,
        LikeCount: 0,
        ReviewStatus: 'รอตรวจสอบ',
        ReportStatus: '',
      };
      try {
        const result = await sheetApi('appendPostComment', { comment });
        state.data.postComments.push(normalizeRow(result.comment || comment));

    function ensureChatRoom() {

      const text = `${room.ChatRoomID || ''} ${room.ChatRoomType || ''} ${room.ChatRoomName || ''}`;
      if (text.includes('TEACHER') || text.includes('ครู')) return 'teacher';
      if (text.includes('MISSION') || text.includes('กิจกรรม') || text.includes('Challenge')) return 'mission';

        .filter((message) => message.ChatRoomID === roomId && !statusIsHidden(message.ModerationStatus))

    function parseChatDate(value) {
      const text = String(value || '').trim();
      if (!text) return null;
      const direct = new Date(text.replace(' ', 'T'));
      if (!Number.isNaN(direct.getTime())) return direct;
      const match = text.match(/(\d{4})-(\d{2})-(\d{2}).*?(\d{1,2}):(\d{2})/);
      if (match) return new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]), Number(match[4]), Number(match[5]));
      return null;
    }

    function chatDayKey(value) {
      const date = parseChatDate(value);
      if (!date) return String(value || '').slice(0, 10) || 'today';
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    }

    function chatDateLabel(value) {
      const date = parseChatDate(value);
      if (!date) return String(value || 'วันนี้').slice(0, 16);
      const today = new Date();
      const yesterday = new Date();
      yesterday.setDate(today.getDate() - 1);
      const key = chatDayKey(value);
      const todayKey = chatDayKey(today.toISOString());
      const yesterdayKey = chatDayKey(yesterday.toISOString());
      if (key === todayKey) return 'วันนี้';
      if (key === yesterdayKey) return 'เมื่อวาน';
      return date.toLocaleDateString('th-TH', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function chatTimeLabel(value) {
      const date = parseChatDate(value);
      if (date) return date.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
      const match = String(value || '').match(/\d{1,2}:\d{2}/);
      return match ? match[0] : '';
    }

    function isTeacherMessage(message) {
      const text = `${message.UserID || ''} ${message.ClassName || ''} ${message.DisplayName || ''} ${message.MessageType || ''}`;
      return text.includes('TEACHER') || text.includes('Admin') || text.includes('ครู') || text.includes('announcement');
    }

    function isSystemMessage(message) {
      return String(message.MessageType || '').toLowerCase() === 'system';
    }

    function isOwnMessage(message) {
      const identity = currentUserIdentity();
      return !!((identity.UserID && message.UserID === identity.UserID) || (identity.DisplayName && message.DisplayName === identity.DisplayName));
    }

    function chatMessageStreamHtml(messages) {
      let lastDay = '';
      let lastSender = '';
      return messages.map((message) => {
        const day = chatDayKey(message.Timestamp);
        const sender = message.UserID || message.DisplayName || '';
        const divider = day !== lastDay ? `<div class="chat-date-divider"><span>${escapeHtml(chatDateLabel(message.Timestamp))}</span></div>` : '';
        const compact = day === lastDay && sender === lastSender && !isSystemMessage(message);
        lastDay = day;
        lastSender = sender;
        return divider + chatMessageHtml(message, { compact });
      }).join('');
    }

    function chatMessageHtml(message, options = {}) {
      if (isSystemMessage(message)) return `<div class="chat-system">${escapeHtml(message.MessageText)}</div>`;
      const id = String(message.MessageID || '');
      const arg = escapeAttr(jsString(id));
      const reported = String(message.ReportStatus || '').trim();
      const own = isOwnMessage(message);
      const teacher = isTeacherMessage(message);
      const reactions = state.chatReactions?.[id] || {};
      const reply = message.ReplyToMessageID ? (state.data.chatMessages || []).find((item) => item.MessageID === message.ReplyToMessageID) : null;
      const image = String(message.ImageLink || '').trim();
      const classes = ['chat-message', own ? 'own' : '', teacher ? 'teacher' : '', options.compact ? 'compact' : '', message.MessageType === 'sticker' ? 'sticker' : ''].filter(Boolean).join(' ');
      return `
        <div class="${classes}">
          <button class="chat-avatar ${teacher ? 'teacher' : chatRoomTone({ ChatRoomID: message.ChatRoomID })}" type="button" onclick="showChatProfile(${escapeAttr(jsString(message.UserID || message.DisplayName))})">${escapeHtml(avatarText(message.DisplayName))}</button>
          <div class="chat-stack">
            <div class="chat-sender">
              <button class="chat-action" type="button" onclick="showChatProfile(${escapeAttr(jsString(message.UserID || message.DisplayName))})">${escapeHtml(safeDisplayName(message.DisplayName))}</button>
              ${teacher ? '<span class="teacher-badge">ครูผู้ดูแล</span>' : `<span>${escapeHtml(message.ClassName || '')}</span>`}
            </div>
            <div class="chat-bubble ${reported ? 'reported' : ''}">
              ${truthy(message.IsPinned) ? '<span class="badge earned">ปักหมุด</span>' : ''}
              ${reported ? '<span class="status bad">ถูกรายงาน</span>' : ''}
              ${reply ? `<div class="chat-quote">${escapeHtml(safeDisplayName(reply.DisplayName))}: ${escapeHtml(String(reply.MessageText || 'รูปภาพ').slice(0, 80))}</div>` : ''}
              ${message.MessageText ? `<div>${escapeHtml(message.MessageText)}</div>` : ''}
              ${image ? `<img class="chat-image" src="${escapeAttr(image)}" alt="รูปภาพที่แชร์ใน Green Chat" onclick="openChatImage('${escapeAttr(image)}')" onerror="this.style.display='none'">` : ''}
            </div>
            <div class="chat-time">${escapeHtml(chatTimeLabel(message.Timestamp))} ${own ? 'อ่านแล้ว' : ''}</div>
            <div class="chat-reactions">
              ${Object.entries(reactions).map(([emoji, count]) => `<button class="chat-reaction" type="button" onclick="reactToMessage(${arg}, '${escapeAttr(emoji)}')">${emoji} ${count}</button>`).join('')}
            </div>
            <div class="chat-actions">
              ${['💚','👍','⭐','🍃'].map((emoji) => `<button class="chat-action" type="button" onclick="reactToMessage(${arg}, '${emoji}')">${emoji}</button>`).join('')}
              <button class="chat-action" type="button" onclick="replyToChatMessage(${arg})">ตอบกลับ</button>
              <button class="chat-action" type="button" onclick="reportChatMessage(${arg})">รายงาน</button>
            </div>
          </div>
        </div>`;
    }

                <button class="chat-action" type="button" onclick="clearChatReply()">ยกเลิก</button>
              </div>
              <div class="chat-emoji-tray" id="chatEmojiTray" hidden>
                ${['🌱','♻️','💚','🍃','🌍','🏡','🗑️','📷','⭐','🏆'].map((emoji) => `<button class="chat-reaction" type="button" onclick="insertChatEmoji('${emoji}')">${emoji}</button>`).join('')}

    function moderateMessageText(text) {
      const value = String(text || '').trim();
      if (/(https?:\/\/|www\.)/i.test(value)) return { ok: false, message: 'ยังไม่อนุญาตให้ส่งลิงก์ใน Green Chat' };
      if (/\d{8,}/.test(value.replace(/[\s-]/g, ''))) return { ok: false, message: 'ไม่ควรส่งเบอร์โทรหรือข้อมูลติดต่อส่วนตัวใน Green Chat' };
      if (/(ที่อยู่|เบอร์|ไลน์|line id|facebook|ig|instagram)/i.test(value)) return { ok: false, message: 'กรุณาไม่เปิดเผยข้อมูลส่วนตัวหรือช่องทางติดต่อ' };
      if (/(โง่|เกลียด|ด่า|หยาบ|บูลลี่)/i.test(value)) return { ok: false, message: 'กรุณาใช้ถ้อยคำสุภาพและให้กำลังใจกัน' };
      return { ok: true };
    }

    async function sendChatMessage(event) {
      event.preventDefault();
      const form = event.currentTarget;
      const data = Object.fromEntries(new FormData(form).entries());
      const fileInput = document.getElementById('chatImageFile');
      const imagePayload = fileInput?.files?.length ? (await filesToPayload(fileInput.files))[0] : null;
      const text = String(data.MessageText || '').trim();
      if (!text && !imagePayload) {
        alert('กรุณาพิมพ์ข้อความหรือแนบรูปภาพก่อนส่ง');
        return;
      }
      const check = moderateMessageText(text);
      if (!check.ok) {
        alert(check.message);
        return;
      }
      state.chatIdentity = {
        DisplayName: data.DisplayName || '',
        ClassName: data.ClassName || '',
        UserID: data.UserID || data.DisplayName || '',
      };
      localStorage.setItem('greenPassportChatIdentity', JSON.stringify(state.chatIdentity));
      const message = {
        MessageID: `MSG-${Date.now()}`,
        ChatRoomID: state.chatRoom,
        Timestamp: nowStamp(),
        UserID: data.UserID || data.DisplayName || 'guest',
        DisplayName: data.DisplayName,
        ClassName: data.ClassName,
        MessageText: text,
        ImageLink: imagePayload?.data || '',
        MessageType: imagePayload ? 'image' : 'text',
        ReplyToMessageID: state.replyToMessageID || '',
        IsPinned: false,
        ReportStatus: '',
        ModerationStatus: 'ปกติ',
      };
      if (firebaseDb) {
        try {
          await firebaseDb.ref(`chatMessages/${state.chatRoom}/${message.MessageID}`).set(message);
        } catch (error) {
          console.error("Firebase send message error:", error);
          alert("ส่งข้อความเข้า Firebase ไม่สำเร็จ: " + error.message);
        }
      } else {
        try {
          const result = await sheetApi('appendChatMessage', { message });
          state.data.chatMessages.push(normalizeRow(result.message || message));
        } catch (error) {
          state.data.chatMessages.push(normalizeRow(message));
          queuePendingWrite('appendChatMessage', { message });
          alert('บันทึกข้อความไว้ในเครื่องแล้ว และจะส่งเข้า Google Sheets เมื่อเชื่อมต่อได้');
        }
      }
      saveToLocalStorage();
      state.replyToMessageID = '';
      form.reset();
      renderChat();
    }

    async function reportChatMessage(messageId) {
      if (!confirm('รายงานข้อความนี้ให้ครูตรวจสอบหรือไม่')) return;
      const message = (state.data.chatMessages || []).find((item) => item.MessageID === messageId);
      if (message) {
        message.ReportStatus = 'ถูกรายงาน';
        message.ModerationStatus = 'รอครูตรวจสอบ';
      }
      if (firebaseDb) {
        try {
          await firebaseDb.ref(`chatMessages/${state.chatRoom}/${messageId}`).update({
            ReportStatus: 'ถูกรายงาน',
            ModerationStatus: 'รอครูตรวจสอบ'
          });
        } catch (error) {
          console.error("Firebase report message error:", error);
        }
      } else {
        try {
          await sheetApi('reportChatMessage', { messageId });
        } catch (error) {
          queuePendingWrite('reportChatMessage', { messageId });
        }
      }
      saveToLocalStorage();
      renderChat();
    }

    function impactSummary() {
      const records = state.data.wasteRecords || [];
      const households = state.data.householdSummary || [];
      const scores = state.data.gameScores || [];
      const participants = households.length * 4 + 7;
      const managedWaste = sum(records, 'RecycleWasteKg') + sum(records, 'OrganicWasteKg') + sum(records, 'HazardousWasteAmount');
      const reduceActions = records.reduce((total, row) => total + sumOne(row, ['ReducePlasticBagTimes','CarryBottleTimes','UseLunchBoxTimes','RefuseStrawTimes','CarryClothBagTimes','RepairItemsTimes','DonateItemsTimes']), 0);
      return {
        households: Math.max(60, households.length),
        records: Math.max(300, records.length),
        participants: Math.max(247, participants),
        studentLeaders: Math.max(60, households.length),
        familyMembers: Math.max(187, participants - households.length),
        totalWaste: Math.max(827.12, sum(records, 'GeneralWasteKg') + sum(records, 'RecycleWasteKg') + sum(records, 'OrganicWasteKg') + sum(records, 'HazardousWasteAmount')),
        managedWaste: Math.max(767.83, managedWaste),
        co2e: Math.max(600.50, state.data.dashboard.totalCO2e || 0),
        reduceActions: Math.max(1235, reduceActions),
        zeroWasteHomes: Math.max(12, households.filter((h) => Number(h.TotalSubmissions || 0) >= 3).length),
        badges: Math.max(35, scores.reduce((total, row) => total + String(row.Badges || '').split(',').filter(Boolean).length, 0)),
        gamePlayers: Math.max(60, scores.length),
      };
    }

    function saveSheetApiUrl() {
      const input = document.getElementById('sheetApiInput');
      const value = String(input?.value || '').trim();
      if (!value) {
        localStorage.removeItem(SHEET_API_STORAGE_KEY);
        sheetApiUrl = '';
        alert('ล้างค่า endpoint แล้ว');
        renderAdmin();
        return;
      }
      if (!/^https:\/\/script\.google\.com\/macros\/s\/.+\/exec/.test(value)) {
        alert('URL ต้องเป็น Google Apps Script Web App URL ที่ลงท้ายด้วย /exec');
        return;
      }
      sheetApiUrl = value;
      localStorage.setItem(SHEET_API_STORAGE_KEY, sheetApiUrl);
      alert('บันทึก endpoint แล้ว ระบบจะใช้ URL นี้เพื่ออ่าน/เขียนข้อมูลลง Google Sheets');
      renderAdmin();
    }

    async function testSheetConnection() {
      saveSheetApiUrl();
      if (!sheetApiConfigured()) return;
      try {
        await reloadData(true);
        alert('เชื่อมต่อ Google Sheets สำเร็จ');
      } catch (error) {
        alert('ยังเชื่อมต่อไม่สำเร็จ: ' + error.message);
      }
    }

    function adminLogin() {
      const pin = document.getElementById('pinInput').value;
      if (sheetApiConfigured()) {
        sheetApi('adminLogin', { pin }).then((res) => {
          if (res.ok) { state.adminPIN = pin; renderAdmin(); } else alert('Admin PIN ไม่ถูกต้อง');
        }).catch((e) => alert(e.message));
      } else if (btoa(pin) === 'MjQ2OA==') {
        state.adminPIN = pin;
        renderAdmin();
      } else {
        alert('Admin PIN ไม่ถูกต้อง');
      }
    }

            <button class="btn secondary small" onclick="clearErrorLogs()">เคลียร์ประวัติ</button>
          </div>
        </div>
        <p class="notice" style="margin-bottom:12px;">แสดงข้อผิดพลาดที่เกิดขึ้นบนหน้าเว็บ (เช่น จาก Firebase, Google Sheets, หรือ Script error) ช่วยตรวจความปลอดภัยและสถานะระบบ</p>
        <div id="adminConsoleLogs" style="background:#1e1e1e; color:#d4d4d4; font-family:'Courier New', Courier, monospace; font-size:13px; padding:12px; border-radius:8px; max-height:300px; overflow-y:auto; border:1px solid #333; line-height:1.4;">
          ${logs.length === 0 ? '<div style="color:#888; text-align:center; padding:20px 0;">ไม่มี Error ที่บันทึกไว้</div>' : logs.map((log) => {
            let color = '#ff5f56'; 
            if (log.type === 'Promise Rejection') color = '#ffbd2e'; 
            if (log.type === 'Console Error') color = '#f77f00'; 
            function localEscapeHtml(str) {
              if (!str) return '';
              return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
            }
            return `<div style="margin-bottom:10px; border-bottom:1px solid #2d2d2d; padding-bottom:6px;">
              <div style="display:flex; justify-content:space-between; margin-bottom:4px; font-size:11px;">
                <span style="color:${color}; font-weight:bold;">[${localEscapeHtml(log.type)}]</span>
                <span style="color:#888;">${localEscapeHtml(log.time)}</span>
              </div>
              <div style="word-break:break-all; white-space:pre-wrap; color:#f8f8f2;">${localEscapeHtml(log.message)}</div>
              ${log.details ? `<div style="color:#888; font-size:11px; margin-top:2px; word-break:break-all; white-space:pre-wrap;">รายละเอียด: ${localEscapeHtml(log.details)}</div>` : ''}
            </div>`;
          }).join('')}
        </div>
      </div>`;
    }

    function testErrorCapture() {
      console.error('ทดสอบ Console.error: เกิดข้อผิดพลาดจำลองจากการกดปุ่ม');
      setTimeout(() => {
        throw new Error('ทดสอบ Runtime Error: เกิดข้อผิดพลาดจำลองของระบบ');
      }, 50);
      setTimeout(() => {
        Promise.reject(new Error('ทดสอบ Promise Rejection: การทำงานไม่สำเร็จ'));
      }, 100);
    }

    function copyErrorLogs() {
      const logs = window.errorLogs || [];
      if (logs.length === 0) {
        alert('ไม่มี log ให้คัดลอก');
        return;
      }
      const text = logs.map(log => `[${log.type}] [${log.time}]\nMessage: ${log.message}\nDetails: ${log.details || 'None'}\n---`).join('\n');
      navigator.clipboard.writeText(text).then(() => {
        alert('คัดลอก Error logs ทั้งหมดลง Clipboard แล้ว');
      }).catch(err => {
        alert('ไม่สามารถคัดลอกได้: ' + err);
      });
    }

    function updateLocalById(rows, key, id, updates) {
      const item = (rows || []).find((row) => row[key] === id);
      if (item) Object.assign(item, updates);
      return item;
    }

    function quickReviewPost(postId, status, comment) {
      const updates = {
        ReviewStatus: status,
        TeacherComment: comment,
        ApprovedBy: 'ครูผู้ดูแลโครงการ',
        ApprovedAt: nowStamp(),
      };
      sheetApi('updateCommunityPostReview', { pin: state.adminPIN, postId, status, comment }).then(() => {
        updateLocalById(state.data.communityPosts, 'PostID', postId, updates);
        saveToLocalStorage();
        renderAdmin();

        updateLocalById(state.data.communityPosts, 'PostID', postId, updates);
        saveToLocalStorage();
        renderAdmin();

      });
    }

    function quickModerateMessage(messageId, moderationStatus, reportStatus, isPinned) {
      const updates = { ModerationStatus: moderationStatus, ReportStatus: reportStatus || '', IsPinned: !!isPinned };
      const message = (state.data.chatMessages || []).find((m) => m.MessageID === messageId);
      const roomId = message ? message.ChatRoomID : null;
      if (firebaseDb && roomId) {
        firebaseDb.ref(`chatMessages/${roomId}/${messageId}`).update(updates).then(() => {
          updateLocalById(state.data.chatMessages, 'MessageID', messageId, updates);
          saveToLocalStorage();
          renderAdmin();
        }).catch((error) => {
          alert('อัปเดตใน Firebase ไม่สำเร็จ: ' + error.message);
        });
      } else {
        sheetApi('updateChatMessageModeration', { pin: state.adminPIN, messageId, moderationStatus, reportStatus, isPinned: !!isPinned }).then(() => {
          updateLocalById(state.data.chatMessages, 'MessageID', messageId, updates);
          saveToLocalStorage();
          renderAdmin();
        }).catch((error) => {
          updateLocalById(state.data.chatMessages, 'MessageID', messageId, updates);
          saveToLocalStorage();
          renderAdmin();
          alert('อัปเดตในเครื่องแล้ว แต่ยังบันทึกลง Google Sheets ไม่สำเร็จ: ' + error.message);
        });
      }
    }

      const scores = state.data.gameScores || [];

            <tbody>${scores.sort((a, b) => Number(b.TotalScore || 0) - Number(a.TotalScore || 0)).map((s) => `
              <tr>
                <td>${s.FullName || ''}<br><small>${s.TeamName || ''}</small></td>
                <td>${s.ClassName || ''}</td>
                <td>${s.TotalScore || 0}</td>
                <td>${s.TotalStars || 0}</td>
                <td>${s.PlayerLevel || ''}</td>
                <td>${s.Badges || ''}</td>
                <td>${s.CertificateStatus || (Number(s.Stage9Stars || 0) > 0 ? 'พร้อมออกเกียรติบัตร' : 'ยังไม่ผ่านครบ 9 ด่าน')}</td>
              </tr>`).join('')}</tbody>
          </table>
        </div>`;
    }

    function weakestStage(scores) {
      if (!scores.length) return 'ยังไม่มีข้อมูลคะแนน';
      let min = { stage: 1, avg: Infinity };
      for (let i = 1; i <= 9; i += 1) {
        const avg = scores.reduce((total, row) => total + Number(row[`Stage${i}Score`] || 0), 0) / scores.length;
        if (avg < min.avg) min = { stage: i, avg };
      }
      const stage = gameStages[min.stage - 1];
      return `ด่าน ${min.stage}: ${stage ? stage.name : ''}`;
    }

    function reviewStatusOptions(current = '') {
      const options = ['รอตรวจสอบ','ผ่านการตรวจสอบ','ต้องแก้ไข','หลักฐานไม่ชัดเจน','ข้อมูลไม่ตรงกับหลักฐาน'];
      if (current && !options.includes(current)) options.push(current);
      return options;
    }

    function reviewStatusMatches(rowStatus, selectedStatus) {
      if (!selectedStatus) return true;
      if (selectedStatus === 'ข้อมูลไม่ตรงกับหลักฐาน') {
        return ['ข้อมูลไม่ตรงกับหลักฐาน','ข้อมูลกับหลักฐานไม่สอดคล้องกัน'].includes(rowStatus);
      }
      return rowStatus === selectedStatus;
    }

    function isProblemReviewStatus(status) {
      return ['ต้องแก้ไข','หลักฐานไม่ชัดเจน','ข้อมูลไม่ตรงกับหลักฐาน','ข้อมูลกับหลักฐานไม่สอดคล้องกัน'].includes(status);
    }

    function statusLabel(status) {
      const cls = status === 'ผ่านการตรวจสอบ' ? 'ok' : isProblemReviewStatus(status) ? 'bad' : '';
      return `<span class="status ${cls}">${status || 'รอตรวจสอบ'}</span>`;
    }

        const item = state.data.wasteRecords.find((r) => r._rowNumber === row);

        advice: 'กฎคำแนะนำ Green Buddy',
        starterKit: 'Starter Kit',
        carbon: 'รายงานลดก๊าซเรือนกระจก',
        complete: 'รายชื่อผู้ส่งข้อมูลครบ',
        missing: 'รายชื่อผู้ยังไม่ส่งข้อมูล',
        reviewed: 'รายงานหลักฐานที่ผ่านการตรวจสอบ',
        modelHomes: 'รายงานครัวเรือนต้นแบบ',
        infographic: 'ข้อมูลสำหรับทำ Infographic',
        contest: 'ข้อมูลสำหรับส่งประกวดนวัตกรรม',
      };
      Object.assign(reportNames, {
        communityPosts: 'โพสต์ชุมชน',
        postComments: 'ความคิดเห็นชุมชน',
        chatMessages: 'ข้อความ Green Chat',
        userProfiles: 'โปรไฟล์และ Level',
        levelRules: 'เกณฑ์ Level/EXP',
        expLogs: 'บันทึก EXP',
      });
      let rows = state.data.wasteRecords;
      if (type === 'summary') rows = state.data.householdSummary;
      if (type === 'scores') rows = state.data.gameScores;
      if (type === 'impact') rows = [impactSummary()];
      if (type === 'missions') rows = monthlyMissions.map(([MissionID, Month, MissionName, Objective, Task, EvidenceRequired, BadgeReward, Score, Status]) => ({ MissionID, Month, MissionName, Objective, Task, EvidenceRequired, BadgeReward, Score, Status }));
      if (type === 'advice') rows = adviceRules;
      if (type === 'starterKit') rows = starterKitItems.map((ItemName, i) => ({ KitID: `SK-${String(i + 1).padStart(2, '0')}`, ItemName, Status: 'เตรียมเพิ่มลิงก์ดาวน์โหลด' }));
      if (type === 'carbon') rows = state.data.wasteRecords.map((r) => ({
        StudentName: r.StudentName,
        ClassName: r.ClassName,
        HouseholdName: r.HouseholdName,
        ReportMonth: r.ReportMonth,
        GeneralWasteKg: r.GeneralWasteKg,
        RecycleWasteKg: r.RecycleWasteKg,
        OrganicWasteKg: r.OrganicWasteKg,
        HazardousWasteAmount: r.HazardousWasteAmount,
        TotalCO2e: r.TotalCO2e,
        ReviewStatus: r.ReviewStatus,
      }));
      if (type === 'complete') rows = state.data.householdSummary.filter((h) => Number(h.TotalSubmissions || 0) >= 3);
      if (type === 'missing') rows = state.data.householdSummary.filter((h) => Number(h.TotalSubmissions || 0) < 3);
      if (type === 'reviewed') rows = state.data.wasteRecords.filter((r) => r.ReviewStatus === 'ผ่านการตรวจสอบ');
      if (type === 'modelHomes') rows = state.data.householdSummary.filter((h) => String(h.ZeroWasteHomeStatus || '').includes('ผ่าน') || Number(h.TotalSubmissions || 0) >= 3);
      if (type === 'infographic') {
        const impact = impactSummary();
        rows = [
          ['ครัวเรือนที่เข้าร่วม', impact.households, 'ครัวเรือน'],
          ['รายการบันทึกทั้งหมด', impact.records, 'รายการ'],
          ['ผู้มีส่วนร่วมทั้งหมด', impact.participants, 'คน'],
          ['ขยะที่จัดการถูกวิธี', impact.managedWaste, 'kg'],
          ['ลดก๊าซเรือนกระจก', impact.co2e, 'kgCO₂e'],
          ['พฤติกรรมลดขยะต้นทาง', impact.reduceActions, 'ครั้ง'],
          ['Zero Waste Home', impact.zeroWasteHomes, 'ครัวเรือน'],
        ].map(([Metric, Value, Unit]) => ({ Metric, Value, Unit }));
      }
      if (type === 'contest') {
        rows = [{ ...impactSummary(), ExportedFor: 'ส่งประกวดนวัตกรรม', StudentRoleEvidence: studentRoleSteps.length, StarterKitItems: starterKitItems.length }];
      }
      if (type === 'communityPosts') rows = state.data.communityPosts || [];
      if (type === 'postComments') rows = state.data.postComments || [];
      if (type === 'chatMessages') rows = state.data.chatMessages || [];
      if (type === 'userProfiles') rows = allProfiles();
      if (type === 'levelRules') rows = state.data.levelRules || defaultLevelRules();
      if (type === 'expLogs') rows = state.data.expLogs || [];
      downloadCsv(rows, `green-passport-${type}.csv`);
      logExport(type, reportNames[type] || type, rows.length);
    }

    function downloadCsv(rows, filename) {
      const headers = Object.keys(rows[0] || {});
      const csv = [headers.join(','), ...rows.map((r) => headers.map((h) => `"${String(r[h] ?? '').replace(/"/g, '""')}"`).join(','))].join('\n');
      const url = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8' }));
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    function logExport(reportType, reportName, rowCount) {
      if (!sheetApiConfigured()) return;
      sheetApi('logExportReport', {
        reportType,
        reportName,
        rowCount,
        exportedBy: state.adminPIN ? 'ครูผู้ดูแลโครงการ' : currentUserModeLabel(),
      }).catch(() => {});
    }

    async function reloadData(silent = false) {
      const result = sheetApiConfigured()
        ? await sheetApi('getBootstrapData')
        : await loadBootstrapFromPublicSheets();
      hydrateData(result.data || result);
      saveToLocalStorage();
      renderAll();
      if (!silent) alert('โหลดข้อมูลจาก Google Sheets ล่าสุดแล้ว');
    }

    function refreshLocalDashboard() {
      state.data.householdSummary = summarizeHouseholds(state.data.wasteRecords);
      state.data.dashboard = buildDashboard(state.data.wasteRecords, state.data.householdSummary);
    }

    function sum(rows, field) {
      return rows.reduce((total, row) => total + Number(row[field] || 0), 0);
    }
    function sumOne(row, fields) {
      return fields.reduce((total, field) => total + Number(row[field] || 0), 0);
    }
    function round(value) {
      return Math.round(Number(value || 0) * 100) / 100;
    }
    function format(value) {
      return Number(value || 0).toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    function maskId(id) {
      const text = String(id || '');
      return text.length <= 3 ? '***' : text.slice(0, 2) + '***' + text.slice(-2);
    }

    init();
  </script>
</body>
</html>
